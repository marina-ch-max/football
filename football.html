<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Футбольные Прогнозы — Россия</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0d1117; --bg2: #161b22; --card: #1c2333; --hover: #242d3d;
            --green: #00e676; --red: #ff5252; --yellow: #ffd740; --blue: #448aff;
            --text: #e6edf3; --text2: #8b949e; --border: #30363d; --radius: 12px;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; padding: 16px; }
        h1 { font-size: 24px; margin-bottom: 8px; }

        /* Buttons */
        .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: var(--blue); color: #fff; }
        .btn-primary:hover { background: #5c9aff; }
        .btn-green { background: var(--green); color: #000; }
        .btn-green:hover { background: #33eb91; }
        .btn-sm { padding: 6px 14px; font-size: 13px; }

        /* Header */
        .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; flex-wrap: wrap; gap: 8px; }
        .header-right { font-size: 12px; color: var(--text2); }

        /* Leagues */
        .leagues { display: flex; gap: 6px; overflow-x: auto; padding: 8px 0 16px; -webkit-overflow-scrolling: touch; }
        .leagues::-webkit-scrollbar { height: 4px; }
        .leagues::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        .league-btn { padding: 8px 16px; background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; color: var(--text2); cursor: pointer; white-space: nowrap; font-size: 13px; transition: all 0.2s; }
        .league-btn:hover { background: var(--card); color: var(--text); }
        .league-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }

        /* Matches */
        .matches { display: flex; flex-direction: column; gap: 8px; }
        .match-card { display: flex; align-items: center; gap: 12px; padding: 16px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; transition: all 0.2s; }
        .match-card:hover { background: var(--card); border-color: var(--blue); }
        .match-date { font-size: 12px; color: var(--text2); min-width: 50px; text-align: center; line-height: 1.3; }
        .match-teams { flex: 1; display: flex; flex-direction: column; gap: 6px; }
        .match-team { display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .match-team img { width: 24px; height: 24px; object-fit: contain; }

        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: flex-start; justify-content: center; overflow-y: auto; padding: 20px; }
        .modal { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); width: 100%; max-width: 700px; margin: 20px auto; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border-bottom: 1px solid var(--border); }
        .modal-header h2 { font-size: 16px; color: var(--text); margin: 0; }
        .modal-close { background: none; border: none; color: var(--text2); font-size: 24px; cursor: pointer; padding: 4px 8px; }
        .modal-close:hover { color: var(--text); }
        .modal-body { padding: 24px; }

        /* Prediction sections */
        .pred-teams { display: flex; align-items: center; justify-content: center; gap: 24px; padding: 20px; margin-bottom: 20px; background: var(--bg2); border-radius: var(--radius); }
        .pred-team { text-align: center; }
        .pred-team img { width: 56px; height: 56px; object-fit: contain; margin-bottom: 8px; }
        .pred-team-name { font-size: 14px; font-weight: 600; }
        .pred-vs { font-size: 20px; font-weight: 700; color: var(--text2); }

        .pred-section { margin-bottom: 20px; }
        .pred-section-title { font-size: 14px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }

        .pred-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; }
        .pred-label { font-size: 14px; color: var(--text2); }
        .pred-value { font-size: 14px; font-weight: 600; }

        .prob-bar { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
        .prob-bar-track { flex: 1; height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; }
        .prob-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
        .prob-bar-label { font-size: 13px; min-width: 45px; text-align: right; font-weight: 600; }
        .prob-high { color: var(--green); }
        .prob-mid { color: var(--yellow); }
        .prob-low { color: var(--red); }

        .form-row { display: flex; gap: 4px; }
        .form-item { width: 28px; height: 28px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
        .form-W { background: #1b5e20; color: var(--green); }
        .form-D { background: #4e342e; color: var(--yellow); }
        .form-L { background: #b71c1c; color: var(--red); }

        .h2h-match { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
        .h2h-match:last-child { border-bottom: none; }
        .h2h-score { font-weight: 700; min-width: 40px; text-align: center; }
        .h2h-date { color: var(--text2); min-width: 80px; }
        .h2h-teams { flex: 1; }

        .shots-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .shots-table th { text-align: left; padding: 8px; color: var(--text2); font-weight: 600; border-bottom: 1px solid var(--border); }
        .shots-table td { padding: 8px; border-bottom: 1px solid var(--border); }
        .shots-table tr:last-child td { border-bottom: none; }

        /* Odds comparison table */
        .odds-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 8px; }
        .odds-table th { text-align: center; padding: 8px 4px; color: var(--text2); font-weight: 600; border-bottom: 1px solid var(--border); font-size: 12px; }
        .odds-table th:first-child { text-align: left; }
        .odds-table td { padding: 8px 4px; border-bottom: 1px solid var(--border); text-align: center; }
        .odds-table td:first-child { text-align: left; color: var(--text2); font-size: 12px; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .odds-table tr:last-child td { border-bottom: none; }
        .odds-table tr.odds-best-row td { font-weight: 700; border-top: 2px solid var(--border); }
        .odds-best { color: var(--green); font-weight: 700; }

        /* Arbitrage alert */
        .arb-alert { display: flex; align-items: center; gap: 10px; padding: 14px; background: #1a2e1a; border: 1px solid var(--green); border-radius: 8px; margin-bottom: 12px; }
        .arb-alert-icon { font-size: 22px; }
        .arb-alert-text { flex: 1; }
        .arb-alert-title { font-size: 14px; font-weight: 700; color: var(--green); }
        .arb-alert-detail { font-size: 12px; color: var(--text2); margin-top: 2px; }
        .arb-near { background: #2e2a1a; border-color: var(--yellow); }
        .arb-near .arb-alert-title { color: var(--yellow); }
        .arb-normal { padding: 8px 12px; background: var(--card); border-radius: 8px; font-size: 12px; color: var(--text2); margin-bottom: 12px; }

        /* Value bet */
        .value-bet { background: #1a2e1a; border: 1px solid var(--green); border-radius: 8px; padding: 10px 14px; margin: 6px 0; }
        .value-bet-label { font-size: 11px; color: var(--green); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
        .value-bet-text { font-size: 13px; color: var(--text); margin-top: 4px; }
        .value-bet-edge { font-weight: 700; color: var(--green); }

        /* Odds freshness */
        .odds-fresh { font-size: 11px; color: var(--text2); text-align: right; margin-top: 4px; }
        .fresh-badge { display:inline-block; padding:3px 8px; border-radius:10px; font-size:11px; font-weight:600; margin-left:6px; }
        .fresh-ok { background:#0f3320; color:#4ade80; border:1px solid #1f6b3a; }
        .fresh-warn { background:#33270f; color:#fbbf24; border:1px solid #7a5a1a; }
        .fresh-stale { background:#331515; color:#f87171; border:1px solid #7a2020; }
        .fresh-panel { padding:10px 14px; border-radius:8px; margin-bottom:12px; font-size:13px; line-height:1.5; }
        .fresh-panel-ok { background:#0f3320; border:1px solid #1f6b3a; color:#86efac; }
        .fresh-panel-warn { background:#33270f; border:1px solid #7a5a1a; color:#fde68a; }
        .fresh-panel-stale { background:#331515; border:1px solid #7a2020; color:#fca5a5; }

        /* Fonbet button */
        .fonbet-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 14px; background: linear-gradient(135deg, #ff6b00, #ff8c00); border: none; border-radius: 10px; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; text-decoration: none; margin: 16px 0; }
        .fonbet-btn:hover { background: linear-gradient(135deg, #ff8c00, #ffa033); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(255,107,0,0.3); }
        .version-switch { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; color: var(--text2); font-size: 12px; cursor: pointer; transition: all 0.2s; }
        .version-switch:hover { background: var(--border); color: var(--text); }

        /* Summary table */
        .summary-table { display: flex; flex-direction: column; gap: 0; }
        .summary-header { display: flex; align-items: center; padding: 8px 12px; color: var(--text2); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid var(--border); }
        .summary-row { display: flex; align-items: center; padding: 10px 12px; border-bottom: 1px solid var(--border); transition: background 0.15s; cursor: pointer; }
        .summary-row:hover { background: var(--hover); }
        .sr-time { width: 80px; flex-shrink: 0; font-size: 11px; color: var(--text2); text-align: center; }
        .sr-teams { flex: 1; min-width: 0; font-size: 13px; }
        .sr-teams div { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sr-pos { font-size: 10px; color: var(--text2); }
        .sr-model { width: 80px; flex-shrink: 0; text-align: center; }
        .sr-xg { font-size: 13px; font-weight: 700; color: var(--text); }
        .sr-fav { font-size: 11px; color: var(--text2); }
        .sr-verdict { width: 90px; flex-shrink: 0; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 3px; }
        .v-bet { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; background: #1a3d1a; color: var(--green); border: 1px solid var(--green); }
        .v-caution { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; background: #3d3a1a; color: var(--yellow); border: 1px solid var(--yellow); }
        .v-skip { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; background: #3d1a1a; color: var(--red); border: 1px solid var(--red); }
        .ev-tag { display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 9px; font-weight: 700; background: #1a2e1a; color: var(--green); margin-top: 2px; }
        .sr-actions { width: 120px; flex-shrink: 0; display: flex; gap: 6px; align-items: center; justify-content: flex-end; }
        .btn-orange { background: linear-gradient(135deg, #ff6b00, #ff8c00); color: #fff; text-decoration: none; }
        .btn-orange:hover { background: linear-gradient(135deg, #ff8c00, #ffa033); }
        @media (max-width: 600px) {
            .summary-header { display: none; }
            .summary-row { flex-wrap: wrap; gap: 6px; padding: 12px; }
            .sr-time { width: auto; text-align: left; }
            .sr-teams { width: 100%; order: -1; }
            .sr-model { width: auto; }
            .sr-verdict { width: auto; flex-direction: row; }
            .sr-actions { width: 100%; justify-content: stretch; }
            .sr-actions .btn { flex: 1; text-align: center; }
        }

        /* Score chips (top-5 most likely scores) */
        .score-chips { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .score-chip { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; text-align: center; min-width: 70px; }
        .score-chip-score { font-size: 18px; font-weight: 700; color: var(--text); }
        .score-chip-prob { font-size: 11px; color: var(--text2); margin-top: 2px; }
        .score-chip:first-child { border-color: var(--green); background: #1a2e1a; }
        .score-chip:first-child .score-chip-prob { color: var(--green); }

        /* Confidence badge */
        .confidence-wrap { display: flex; align-items: center; justify-content: center; gap: 16px; padding: 16px; margin-bottom: 20px; }
        .confidence-circle { width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 800; border: 3px solid; }
        .conf-high { color: var(--green); border-color: var(--green); background: #1a2e1a; }
        .conf-mid { color: var(--yellow); border-color: var(--yellow); background: #2e2a1a; }
        .conf-low { color: var(--red); border-color: var(--red); background: #2d1515; }
        .confidence-text { font-size: 14px; }
        .confidence-label { font-weight: 700; font-size: 16px; }

        /* Kelly calculator */
        .kelly-calc { background: #1a2333; border: 1px solid var(--blue); border-radius: 8px; padding: 12px 14px; margin: 8px 0; }
        .kelly-title { font-size: 12px; color: var(--blue); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; margin-bottom: 6px; }
        .kelly-row { font-size: 13px; color: var(--text); padding: 4px 0; display: flex; justify-content: space-between; }
        .kelly-value { font-weight: 700; color: var(--blue); }

        /* Standings table */
        .standings-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .standings-table th { text-align: center; padding: 8px 4px; color: var(--text2); font-weight: 600; border-bottom: 2px solid var(--border); font-size: 11px; }
        .standings-table th:nth-child(2) { text-align: left; }
        .standings-table td { padding: 6px 4px; border-bottom: 1px solid var(--border); text-align: center; font-size: 12px; }
        .standings-table td:nth-child(2) { text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
        .standings-table tr:last-child td { border-bottom: none; }
        .zone-cl { border-left: 3px solid var(--blue); }
        .zone-el { border-left: 3px solid #ff9800; }
        .zone-conf { border-left: 3px solid #9c27b0; }
        .zone-rel { border-left: 3px solid var(--red); }
        .standings-btn { background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text2); cursor: pointer; padding: 8px 14px; font-size: 13px; transition: all 0.2s; }
        .standings-btn:hover { background: var(--hover); color: var(--text); border-color: var(--blue); }
        .standings-legend { display: flex; gap: 12px; margin-top: 10px; flex-wrap: wrap; }
        .standings-legend-item { font-size: 11px; color: var(--text2); display: flex; align-items: center; gap: 4px; }
        .standings-legend-dot { width: 10px; height: 10px; border-radius: 2px; }

        /* Form split (home/away) */
        .form-split { margin-top: 4px; display: flex; gap: 16px; flex-wrap: wrap; }
        .form-split-group { display: flex; align-items: center; gap: 6px; }
        .form-split-label { font-size: 11px; color: var(--text2); min-width: 50px; }

        /* Verdict box */
        .verdict-box { border-radius: 10px; padding: 16px; margin: 16px 0; text-align: center; }
        .verdict-bet { background: #1a2e1a; border: 2px solid var(--green); }
        .verdict-caution { background: #2e2a1a; border: 2px solid var(--yellow); }
        .verdict-skip { background: #2d1515; border: 2px solid var(--red); }
        .verdict-title { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
        .verdict-bet .verdict-title { color: var(--green); }
        .verdict-caution .verdict-title { color: var(--yellow); }
        .verdict-skip .verdict-title { color: var(--red); }
        .verdict-subtitle { font-size: 13px; color: var(--text2); margin-bottom: 12px; }
        .verdict-checklist { text-align: left; display: inline-block; }
        .verdict-check { font-size: 13px; padding: 3px 0; }
        .verdict-pass { color: var(--green); }
        .verdict-fail { color: var(--text2); }

        /* Loading */
        .loading { text-align: center; padding: 40px; color: var(--text2); }
        .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-msg { padding: 16px; background: #2d1515; border: 1px solid var(--red); border-radius: 8px; color: var(--red); font-size: 14px; margin: 12px 0; }
        .empty-msg { text-align: center; padding: 40px; color: var(--text2); font-size: 14px; }
        .info-msg { padding: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text2); font-size: 12px; margin: 8px 0; }

        @media (max-width: 600px) {
            .container { padding: 8px; }
            .match-card { flex-wrap: wrap; }
            .pred-teams { gap: 12px; flex-wrap: wrap; }
            .pred-team img { width: 40px; height: 40px; }
            .modal { margin: 8px; }
            .modal-body { padding: 16px; }
            .pred-row { flex-wrap: wrap; gap: 4px; }
        }
        /* Market vs Model */
        .mvm-box { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px; margin-bottom:16px; }
        .mvm-title { font-size:14px; font-weight:700; margin-bottom:10px; color:var(--text); }
        .mvm-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
        .mvm-label { font-size:12px; color:var(--text2); min-width:30px; text-align:center; }
        .mvm-bars { flex:1; position:relative; height:28px; border-radius:6px; overflow:hidden; background:var(--bg); }
        .mvm-bar-market { position:absolute; top:0; left:0; height:14px; border-radius:6px 6px 0 0; opacity:0.7; }
        .mvm-bar-model { position:absolute; bottom:0; left:0; height:14px; border-radius:0 0 6px 6px; }
        .mvm-pct { font-size:11px; font-weight:600; min-width:36px; text-align:right; }
        .mvm-legend { display:flex; gap:14px; font-size:11px; color:var(--text2); margin-top:6px; }
        .mvm-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:4px; vertical-align:middle; }
        .mvm-edge { display:inline-block; margin-left:6px; padding:1px 6px; border-radius:8px; font-size:10px; font-weight:700; }
        .mvm-edge-pos { background:#1a3d1a; color:var(--green); border:1px solid var(--green); }
        .mvm-edge-neg { background:#3d1a1a; color:var(--red); border:1px solid var(--red); }
        /* Guide */
        .guide-section { margin-bottom:20px; }
        .guide-section h3 { font-size:15px; font-weight:700; color:var(--blue); margin-bottom:8px; padding-bottom:5px; border-bottom:1px solid var(--border); }
        .guide-section p, .guide-section li { font-size:13px; color:var(--text); line-height:1.7; }
        .guide-section ul { padding-left:18px; margin:6px 0; }
        .guide-section li { margin-bottom:3px; }
        .guide-tag { display:inline-block; padding:2px 8px; border-radius:10px; font-size:10px; font-weight:700; }
        .guide-tag-green { background:#1a3d1a; color:var(--green); border:1px solid var(--green); }
        .guide-tag-yellow { background:#3d3a1a; color:var(--yellow); border:1px solid var(--yellow); }
        .guide-tag-red { background:#3d1a1a; color:var(--red); border:1px solid var(--red); }
        .calc-box { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:14px; margin:10px 0; }
        .calc-row { display:flex; gap:10px; margin-bottom:8px; align-items:center; flex-wrap:wrap; }
        .calc-input { background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:6px 10px; color:var(--text); font-size:13px; width:100px; }
        .calc-result { margin-top:10px; padding:10px; border-radius:8px; font-size:13px; line-height:1.6; }
        .calc-result-single { background:#1a3d1a; border:1px solid var(--green); }
        .calc-result-express { background:#3d3a1a; border:1px solid var(--yellow); }
        /* My Bets */
        .my-bet-badge { font-size:14px; width:30px; height:30px; display:flex; align-items:center; justify-content:center; background:var(--blue); color:#fff; border-radius:50%; cursor:pointer; position:relative; flex-shrink:0; }
        .my-bet-badge:hover::after { content:attr(data-tip); position:absolute; bottom:110%; left:50%; transform:translateX(-50%); background:var(--card); border:1px solid var(--border); color:var(--text); font-size:11px; padding:4px 8px; border-radius:6px; white-space:nowrap; z-index:10; }
        .bet-form { padding:16px; }
        .bet-form-title { font-size:15px; font-weight:700; margin-bottom:12px; }
        .bet-outcome { display:flex; gap:8px; margin:12px 0; }
        .bet-outcome button { flex:1; padding:10px; border:2px solid var(--border); background:var(--bg2); color:var(--text); border-radius:8px; cursor:pointer; font-weight:600; font-size:14px; transition:all .15s; }
        .bet-outcome button:hover { border-color:var(--text2); }
        .bet-outcome button.selected { border-color:var(--green); background:rgba(0,230,118,0.1); color:var(--green); }
        .bet-result-win { color:var(--green); font-weight:600; }

    function findOddsForMatch(match, oddsData) {
        if (!oddsData || !oddsData.events) return null;
        const byId = oddsData.events.find(e => e.matchId === match.id);
        if (byId) return byId;
        const matchDate = new Date(match.utcDate).getTime();
        // Нормализация суффиксов (FC/CF/SC/SK/FK/AFC/SSC/AC) — как в Python pipeline
        const normalize = (s) => {
            let n = (s || '').toLowerCase().trim();
            const suffixes = [' fc', ' cf', ' sc', ' sk', ' fk', ' afc', ' ssc', ' ac'];
            for (const suf of suffixes) {
                if (n.endsWith(suf)) { n = n.slice(0, -suf.length).trim(); break; }
            }
            return n;
        };
        const hName = normalize(match.homeTeam.name);
        const aName = normalize(match.awayTeam.name);
        return oddsData.events.find(e => {
            const oddsDate = new Date(e.commenceTime).getTime();
            if (Math.abs(matchDate - oddsDate) > 86400000) return false;
            const oh = normalize(e.homeTeam);
            const oa = normalize(e.awayTeam);
            // Точное совпадение ИЛИ одно имя — префикс другого (не произвольный includes)
            const matchNames = (a, b) => a === b || a.startsWith(b + ' ') || b.startsWith(a + ' ');
            return matchNames(oh, hName) && matchNames(oa, aName);
        }) || null;
    }

    // ==================== MATH (Dixon-Coles + Elo) ====================
    function factorial(n) { let r = 1; for (let i = 2; i <= n; i++) r *= i; return r; }
    function poisson(lambda, k) {
        if (lambda <= 0) return k === 0 ? 1 : 0;
        return Math.pow(lambda, k) * Math.exp(-lambda) / factorial(k);
    }

    // Dixon-Coles rho correction for low scores (0-0, 0-1, 1-0, 1-1)
    function dixonColesRho(x, y, hLam, aLam, rho) {
        if (x === 0 && y === 0) return 1 - hLam * aLam * rho;
        if (x === 1 && y === 0) return 1 + aLam * rho;
        if (x === 0 && y === 1) return 1 + hLam * rho;
        if (x === 1 && y === 1) return 1 - rho;
        return 1;
    }

    // Dixon-Coles joint probability P(home=x, away=y)
    function dcProb(x, y, hLam, aLam, rho) {
        return poisson(hLam, x) * poisson(aLam, y) * dixonColesRho(x, y, hLam, aLam, rho);
    }

    // Score matrix up to maxGoals (нормирована: сумма всех ячеек = 1 после DC-коррекции)
    function scoreMatrix(hLam, aLam, rho, maxGoals) {
        const m = [];
        let sum = 0;
        for (let h = 0; h <= maxGoals; h++) {
            m[h] = [];
            for (let a = 0; a <= maxGoals; a++) {
                const p = dcProb(h, a, hLam, aLam, rho);
                m[h][a] = p;
                sum += p;
            }
        }
        if (sum > 0) {
            for (let h = 0; h <= maxGoals; h++)
                for (let a = 0; a <= maxGoals; a++)
                    m[h][a] /= sum;
        }
        return m;
    }

    function probOver(hLam, aLam, threshold, rho) {
        rho = rho || 0;
        const max = Math.max(threshold + 3, 8);
        const mat = scoreMatrix(hLam, aLam, rho, max);
        let under = 0;
        for (let h = 0; h <= max; h++)
            for (let a = 0; a <= max; a++)
                if (h + a <= threshold) under += mat[h][a];
        return Math.min(Math.max(1 - under, 0), 1);
    }

    function probBTTS(hLam, aLam, rho) {
        rho = rho || 0;
        const max = 8;
        const mat = scoreMatrix(hLam, aLam, rho, max);
        let btts = 0;
        for (let h = 1; h <= max; h++)
            for (let a = 1; a <= max; a++)
                btts += mat[h][a];
        return btts;
    }

    // 1X2 probabilities from score matrix
    function prob1X2(hLam, aLam, rho) {
        const max = 8;
        const mat = scoreMatrix(hLam, aLam, rho, max);
        let p1 = 0, pX = 0, p2 = 0;
        for (let h = 0; h <= max; h++)
            for (let a = 0; a <= max; a++) {
                if (h > a) p1 += mat[h][a];
                else if (h === a) pX += mat[h][a];
                else p2 += mat[h][a];
            }
        return { p1, pX, p2 };
    }

    // Elo rating calculation from finished matches
    function calcElo(finishedMatches) {
        const elo = {};
        const K = 32;
        const sorted = [...finishedMatches].sort((a, b) => new Date(a.utcDate) - new Date(b.utcDate));
        for (const m of sorted) {
            const hId = m.homeTeam.id, aId = m.awayTeam.id;
            if (!elo[hId]) elo[hId] = 1500;
            if (!elo[aId]) elo[aId] = 1500;
            const hElo = elo[hId], aElo = elo[aId];
            const expected = 1 / (1 + Math.pow(10, (aElo - hElo - 65) / 400)); // 65 pts home advantage
            let actual;
            if (m.homeGoals > m.awayGoals) actual = 1;
            else if (m.homeGoals === m.awayGoals) actual = 0.5;
            else actual = 0;
            const goalDiff = Math.abs(m.homeGoals - m.awayGoals);
            const goalMult = goalDiff <= 1 ? 1 : goalDiff === 2 ? 1.5 : (1.75 + (goalDiff - 3) * 0.375);
            elo[hId] = hElo + K * goalMult * (actual - expected);
            elo[aId] = aElo + K * goalMult * ((1 - actual) - (1 - expected));
        }
        return elo;
    }

    // League-average attack/defense strengths (Dixon-Coles)
    function calcLeagueStats(standings) {
        let totalGF = 0, totalGA = 0, totalPlayed = 0;
        for (const s of standings) {
            totalGF += s.gf;
            totalGA += s.ga;
            totalPlayed += s.played;
        }
        const avgGoals = totalPlayed > 0 ? totalGF / totalPlayed : 1.3;
        return { avgGoals, totalPlayed };
    }

    // Estimate rho from league data (~-0.13 is typical)
    function estimateRho(avgGoals) {
        return Math.max(-0.2, Math.min(0, -0.05 - 0.03 * (3.0 - avgGoals)));
    }

    // Top-5 most likely scores from Dixon-Coles matrix
    function getTopScores(hLam, aLam, rho, n = 5) {
        const mat = scoreMatrix(hLam, aLam, rho, 6);
        const scores = [];
        for (let h = 0; h <= 6; h++)
            for (let a = 0; a <= 6; a++)
                scores.push({ home: h, away: a, prob: mat[h][a] });
        scores.sort((a, b) => b.prob - a.prob);
        return scores.slice(0, n);
    }

    // Form split into all/home/away
    function calcFormSplit(teamId, finishedMatches) {
        const all = [], home = [], away = [];
        const sorted = [...finishedMatches].sort((a, b) => new Date(b.utcDate) - new Date(a.utcDate));
        for (const m of sorted) {
            if (all.length >= 5 && home.length >= 3 && away.length >= 3) break;
            if (m.homeTeam.id === teamId) {
                const r = m.homeGoals > m.awayGoals ? 'W' : m.homeGoals === m.awayGoals ? 'D' : 'L';
                if (all.length < 5) all.push(r);
                if (home.length < 5) home.push(r);
            } else if (m.awayTeam.id === teamId) {
                const r = m.awayGoals > m.homeGoals ? 'W' : m.awayGoals === m.homeGoals ? 'D' : 'L';
                if (all.length < 5) all.push(r);
                if (away.length < 5) away.push(r);
            }
        }
        return { all, home, away };
    }

    // Confidence rating (0-10)
    function calcConfidence(outcomes, hElo, aElo, homeFormAll, awayFormAll, matchOdds, h2hMatches, homeId) {
        let score = 0;
        const eloDiff = Math.abs(hElo - aElo);
        // Elo diff (0-2)
        if (eloDiff > 150) score += 2;
        else if (eloDiff > 80) score += 1;
        // 1X2 dominance (0-3)
        const maxP = Math.max(outcomes.p1, outcomes.pX, outcomes.p2);
        if (maxP > 0.70) score += 3;
        else if (maxP > 0.55) score += 2;
        else if (maxP > 0.45) score += 1;
        // Form of the favorite (0-2)
        const favForm = outcomes.p1 >= outcomes.p2 ? homeFormAll : awayFormAll;
        const wins = favForm.filter(r => r === 'W').length;
        if (wins >= 4) score += 2;
        else if (wins >= 3) score += 1;
        // Value bet (0-2)
        if (matchOdds && matchOdds.h2h && matchOdds.h2h.best) {
            const best = matchOdds.h2h.best;
            const checks = [
                { p: outcomes.p1, odds: best.home },
                { p: outcomes.pX, odds: best.draw },
                { p: outcomes.p2, odds: best.away },
            ];
            let maxEV = 0;
            for (const c of checks) {
                if (c.odds > 0) maxEV = Math.max(maxEV, c.p * c.odds - 1);
            }
            if (maxEV > 0.15) score += 2;
            else if (maxEV > 0.08) score += 1;
        }
        // H2H consistency (0-1)
        if (h2hMatches && h2hMatches.length >= 2) {
            const favId = outcomes.p1 >= outcomes.p2 ? homeId : null;
            let favWins = 0;
            for (const m of h2hMatches.slice(0, 3)) {
                if (favId) {
                    if (m.homeTeam.id === favId && m.homeGoals > m.awayGoals) favWins++;
                    else if (m.awayTeam.id === favId && m.awayGoals > m.homeGoals) favWins++;
                } else {
                    const aId = outcomes.p2 > outcomes.p1 ? (m.awayTeam.id) : null;
                    if (aId && m.awayTeam.id === aId && m.awayGoals > m.homeGoals) favWins++;
                    else if (aId && m.homeTeam.id === aId && m.homeGoals > m.awayGoals) favWins++;
                }
            }
            if (favWins >= 2) score += 1;
        }
        return Math.min(score, 10);
    }

    function timeAgo(dateStr) {

        if (hours < 1) return '\u0442\u043E\u043B\u044C\u043A\u043E \u0447\u0442\u043E';

    }

    // Свежесть коэффициентов: зелёный ≤3ч, жёлтый 3-12ч, красный >12ч
    function oddsFreshness(updated) {
        if (!updated) return { level: 'stale', label: '\u041D\u0435\u0442 \u0434\u0430\u043D\u043D\u044B\u0445', hours: null };
        const hours = (Date.now() - new Date(updated).getTime()) / 3600000;
        if (hours <= 3) return { level: 'ok', label: '\u0421\u0432\u0435\u0436\u0438\u0435', hours };
        if (hours <= 12) return { level: 'warn', label: '\u0423\u0441\u0442\u0430\u0440\u0435\u0432\u0430\u044E\u0442', hours };
        return { level: 'stale', label: '\u0421\u0442\u0430\u0440\u044B\u0435', hours };
    }

        const hoursText = f.hours === null ? '' : ' (' + (f.hours < 1 ? '<1\u0447' : Math.floor(f.hours) + '\u0447') + ')';

            : f.level === 'warn'

        const when = updated ? '\u041E\u0431\u043D\u043E\u0432\u043B\u0435\u043D\u043E: ' + timeAgo(updated) : '';
        return `<div class="fresh-panel fresh-panel-${f.level}">${emoji} <b>${f.label}</b>. ${msg} <span style="opacity:0.8">${when}</span></div>`;
    }

    // ==================== FORM CALCULATION ====================
    function calcForm(teamId, finishedMatches) {
        const results = [];
        const sorted = [...finishedMatches].sort((a, b) => new Date(b.utcDate) - new Date(a.utcDate));
        for (const m of sorted) {
            if (results.length >= 5) break;
            if (m.homeTeam.id === teamId) {
                if (m.homeGoals > m.awayGoals) results.push('W');
                else if (m.homeGoals === m.awayGoals) results.push('D');
                else results.push('L');
            } else if (m.awayTeam.id === teamId) {
                if (m.awayGoals > m.homeGoals) results.push('W');
                else if (m.awayGoals === m.homeGoals) results.push('D');
                else results.push('L');
            }
        }
        return results;
    }

    function calcMatchSummary(match, data, matchOdds) {
        const home = match.homeTeam, away = match.awayTeam;
        const standingsArr = data.standings || [];
        const standings = {};
        standingsArr.forEach(s => { standings[s.id] = s; });
        const hStats = standings[home.id], aStats = standings[away.id];
        const homePos = hStats ? hStats.pos : '?';
        const awayPos = aStats ? aStats.pos : '?';

        const league = calcLeagueStats(standingsArr);
        const avgGoals = league.avgGoals;
        const finMatches = data.finished || [];

        let totalHomeG = 0, totalAwayG = 0, totalMatchCount = 0;
        for (const m of finMatches) { totalHomeG += m.homeGoals; totalAwayG += m.awayGoals; totalMatchCount++; }

        let hHomeGF = 0, hHomeGA = 0, hHomeCount = 0, aAwayGF = 0, aAwayGA = 0, aAwayCount = 0;
        for (const m of finMatches) {
            if (m.homeTeam.id === home.id) { hHomeGF += m.homeGoals; hHomeGA += m.awayGoals; hHomeCount++; }
            if (m.awayTeam.id === away.id) { aAwayGF += m.awayGoals; aAwayGA += m.homeGoals; aAwayCount++; }
        }
        const avgHomeGF = totalMatchCount > 0 ? totalHomeG / totalMatchCount : avgGoals;
        const avgAwayGF = totalMatchCount > 0 ? totalAwayG / totalMatchCount : avgGoals;
        // Shrinkage: при малом числе матчей тянем силу к 1 (лигe среднее). k=5 «виртуальных» средних игр.
        const shrink = (val, n) => { const k = 5; return (n * val + k * 1) / (n + k); };
        let hAttack = 1, hDefense = 1, aAttack = 1, aDefense = 1;
        if (hHomeCount > 0) {
            hAttack = shrink((hHomeGF / hHomeCount) / avgHomeGF, hHomeCount);
            hDefense = shrink((hHomeGA / hHomeCount) / avgAwayGF, hHomeCount);
        }
        if (aAwayCount > 0) {
            aAttack = shrink((aAwayGF / aAwayCount) / avgAwayGF, aAwayCount);
            aDefense = shrink((aAwayGA / aAwayCount) / avgHomeGF, aAwayCount);
        }

        const elo = calcElo(finMatches);
        const hElo = elo[home.id] || 1500, aElo = elo[away.id] || 1500;
        const eloAdj = 1 + (hElo - aElo) / 4000;
        // Используем avgHomeGF / avgAwayGF (уже содержат домашнее преимущество лиги), не множим ещё раз на HOME_ADV
        const homeXG = avgHomeGF * hAttack * aDefense * eloAdj;
        const awayXG = avgAwayGF * aAttack * hDefense / eloAdj;
        const rho = estimateRho(avgGoals);
        const outcomes = prob1X2(homeXG, awayXG, rho);

        // Verdict (simplified)
        const homeFormAll = calcFormSplit(home.id, finMatches).all;
        const awayFormAll = calcFormSplit(away.id, finMatches).all;
        const h2hAll = finMatches.filter(m =>
            (m.homeTeam.id === home.id && m.awayTeam.id === away.id) ||
            (m.homeTeam.id === away.id && m.awayTeam.id === home.id)
        ).sort((a, b) => new Date(b.utcDate) - new Date(a.utcDate)).slice(0, 3);

        let hasValue = false, evBest = 0, evLabel = '';
        if (matchOdds && matchOdds.h2h && matchOdds.h2h.best) {
            const best = matchOdds.h2h.best;
            const ps = [outcomes.p1, outcomes.pX, outcomes.p2];
            const os = [best.home, best.draw, best.away];
            const labels = ['\u041F1', '\u0425', '\u041F2'];
            // Нормированные рыночные вероятности (убираем overround букмекеров)
            let invSum = 0;
            for (const o of os) if (o > 0) invSum += 1 / o;
            for (let i = 0; i < 3; i++) {
                if (os[i] > 0 && invSum > 0) {
                    const pMarket = (1 / os[i]) / invSum;
                    const ev = ps[i] * os[i] - 1;
                    if (ev > evBest) { evBest = ev; evLabel = labels[i]; }
                    // Value: модель оценивает вероятность на 8+ п.п. выше честной рыночной И EV > 3%
                    if (ps[i] - pMarket > 0.08 && ev > 0.03) hasValue = true;
                }
            }
        }

        // Verdict checks (must match renderVerdictHTML exactly)
        // 3 НЕЗАВИСИМЫХ фактора (убрали скоррелированные Elo/H2H/noTrap):
        //  1. Уверенность модели (maxP > 0.55)
        //  2. Value bet (уже учитывает рынок)
        //  3. Асимметрия формы (фаворит в форме, андердог — нет)
        const maxP = Math.max(outcomes.p1, outcomes.pX, outcomes.p2);
        const favForm = outcomes.p1 >= outcomes.p2 ? homeFormAll : awayFormAll;
        const undForm = outcomes.p1 >= outcomes.p2 ? awayFormAll : homeFormAll;
        const wins = favForm.filter(r => r === 'W').length;
        const undWins = undForm.filter(r => r === 'W').length;
        const formGap = wins - undWins;
        let passed = 0;
        if (maxP > 0.55) passed++;
        if (hasValue) passed++;
        if (formGap >= 2) passed++;
        // H2H оставляем только в детальном рендере для справки, не считаем
        let h2hOk = false;
        if (h2hAll.length >= 2) {
            const favId = outcomes.p1 >= outcomes.p2 ? home.id : away.id;
            let favWins = 0;
            for (const m of h2hAll.slice(0, 3)) {
                if (m.homeTeam.id === favId && m.homeGoals > m.awayGoals) favWins++;
                else if (m.awayTeam.id === favId && m.awayGoals > m.homeGoals) favWins++;
            }
            h2hOk = favWins >= 2;
        }
        // h2hOk и noTrap больше НЕ учитываются в verdict — они скоррелированы с maxP/формой.

        let verdictClass, verdictLabel;
        if (passed === 3 && hasValue) { verdictClass = 'v-bet'; verdictLabel = '\u0421\u0422\u0410\u0412\u042c'; }
        else if (passed >= 2) { verdictClass = 'v-caution'; verdictLabel = '\u041E\u0421\u0422\u041E\u0420.'; }
        else { verdictClass = 'v-skip'; verdictLabel = '\u041F\u0420\u041E\u041F.'; }

        const favLabel = outcomes.p1 >= outcomes.p2 ? home.name : (outcomes.p2 > outcomes.p1 ? away.name : '\u041D\u0438\u0447\u044C\u044F');
        const favP = Math.max(outcomes.p1, outcomes.p2, outcomes.pX);

        return { homeXG, awayXG, outcomes, verdictClass, verdictLabel, hasValue, homePos, awayPos, evBest, evLabel, favLabel, favP, passed };
    }

    function renderPrediction(match, data, matchOdds, oddsData) {
        const home = match.homeTeam;
        const away = match.awayTeam;
        const standingsArr = data.standings || [];
        const standings = {};
        standingsArr.forEach(s => { standings[s.id] = s; });

        const hStats = standings[home.id];
        const aStats = standings[away.id];

        // === DIXON-COLES MODEL ===
        const league = calcLeagueStats(standingsArr);
        const avgGoals = league.avgGoals;
        const finMatches = data.finished || [];

        // HOME_ADV from actual league data
        let totalHomeG = 0, totalAwayG = 0, totalMatchCount = 0;
        for (const m of finMatches) {
            totalHomeG += m.homeGoals;
            totalAwayG += m.awayGoals;
            totalMatchCount++;
        }
        const HOME_ADV = totalMatchCount > 0 && totalAwayG > 0 ? totalHomeG / totalAwayG : 1.25;

        // Attack & defense strengths from HOME/AWAY splits
        let hHomeGF = 0, hHomeGA = 0, hHomeCount = 0;
        let aAwayGF = 0, aAwayGA = 0, aAwayCount = 0;
        for (const m of finMatches) {
            if (m.homeTeam.id === home.id) {
                hHomeGF += m.homeGoals; hHomeGA += m.awayGoals; hHomeCount++;
            }
            if (m.awayTeam.id === away.id) {
                aAwayGF += m.awayGoals; aAwayGA += m.homeGoals; aAwayCount++;
            }
        }
        const avgHomeGF = totalMatchCount > 0 ? totalHomeG / totalMatchCount : avgGoals;
        const avgAwayGF = totalMatchCount > 0 ? totalAwayG / totalMatchCount : avgGoals;
        const avgHomeGA = avgAwayGF;
        const avgAwayGA = avgHomeGF;

        let hAttack = 1, hDefense = 1, aAttack = 1, aDefense = 1;
        if (hHomeCount > 0) {
            hAttack = (hHomeGF / hHomeCount) / avgHomeGF;
            hDefense = (hHomeGA / hHomeCount) / avgHomeGA;
        }
        if (aAwayCount > 0) {
            aAttack = (aAwayGF / aAwayCount) / avgAwayGF;
            aDefense = (aAwayGA / aAwayCount) / avgAwayGA;
        }

        // === ELO ADJUSTMENT (weak, avoids double-counting) ===
        const elo = calcElo(finMatches);
        const hElo = elo[home.id] || 1500;
        const aElo = elo[away.id] || 1500;
        const eloAdj = 1 + (hElo - aElo) / 4000;

        // Expected goals (Dixon-Coles with home/away strengths)
        const homeXG = avgGoals * hAttack * aDefense * HOME_ADV * eloAdj;
        const awayXG = avgGoals * aAttack * hDefense / eloAdj;
        const totalXG = homeXG + awayXG;

        // Rho parameter for Dixon-Coles correction
        const rho = estimateRho(avgGoals);

        // 1X2 probabilities
        const outcomes = prob1X2(homeXG, awayXG, rho);
        const pOver15 = probOver(homeXG, awayXG, 1, rho);
        const pOver25 = probOver(homeXG, awayXG, 2, rho);
        const pOver35 = probOver(homeXG, awayXG, 3, rho);
        const pBtts = probBTTS(homeXG, awayXG, rho);

        // Top-5 most likely scores
        const topScores = getTopScores(homeXG, awayXG, rho, 5);

        // Form from finished matches (split home/away)
        const homeFormSplit = calcFormSplit(home.id, data.finished || []);
        const awayFormSplit = calcFormSplit(away.id, data.finished || []);
        const homeForm = homeFormSplit.all;
        const awayForm = awayFormSplit.all;

        const formHtml = (form) => {
            if (!form.length) return '<span style="color:var(--text2)">\u041D\u0435\u0442 \u0434\u0430\u043D\u043D\u044B\u0445</span>';
            return form.map(c => `<div class="form-item form-${c}">${c === 'W' ? '\u0412' : c === 'D' ? '\u041D' : '\u041F'}</div>`).join('');
        };

        // Recent H2H from finished matches
        let h2hHTML = '';
        const h2hMatches = (data.finished || []).filter(m =>
            (m.homeTeam.id === home.id && m.awayTeam.id === away.id) ||
            (m.homeTeam.id === away.id && m.awayTeam.id === home.id)
        ).sort((a, b) => new Date(b.utcDate) - new Date(a.utcDate)).slice(0, 3);

        if (h2hMatches.length > 0) {
            h2hHTML = `
            <div class="pred-section">
                <div class="pred-section-title">\u041B\u0438\u0447\u043D\u044B\u0435 \u0432\u0441\u0442\u0440\u0435\u0447\u0438 (\u043F\u043E\u0441\u043B\u0435\u0434\u043D\u0438\u0435)</div>
                ${h2hMatches.map(m => `
                    <div class="h2h-match">

                        <div class="h2h-score">${m.homeGoals} : ${m.awayGoals}</div>
                        <div class="h2h-teams" style="text-align:right">${m.awayTeam.name}</div>
                    </div>
                `).join('')}

        // Season stats table
        let statsHTML = '';
        if (hStats && aStats) {
            statsHTML = `
            <div class="pred-section">
                <div class="pred-section-title">\u0421\u0442\u0430\u0442\u0438\u0441\u0442\u0438\u043A\u0430 \u0437\u0430 \u0441\u0435\u0437\u043E\u043D</div>
                <table class="shots-table">

                    <tr><td style="color:var(--text2)">\u041F\u043E\u0431\u0435\u0434\u044B</td><td>${hStats.won}</td><td>${aStats.won}</td></tr>
                    <tr><td style="color:var(--text2)">\u041D\u0438\u0447\u044C\u0438</td><td>${hStats.draw}</td><td>${aStats.draw}</td></tr>
                    <tr><td style="color:var(--text2)">\u041F\u043E\u0440\u0430\u0436\u0435\u043D\u0438\u044F</td><td>${hStats.lost}</td><td>${aStats.lost}</td></tr>
                    <tr><td style="color:var(--text2)">\u0417\u0430\u0431\u0438\u0442\u043E</td><td>${hStats.gf}</td><td>${aStats.gf}</td></tr>
                    <tr><td style="color:var(--text2)">\u041F\u0440\u043E\u043F\u0443\u0449\u0435\u043D\u043E</td><td>${hStats.ga}</td><td>${aStats.ga}</td></tr>
                    <tr><td style="color:var(--text2)">\u0420\u0430\u0437\u043D\u0438\u0446\u0430</td><td>${hStats.gd > 0 ? '+' : ''}${hStats.gd}</td><td>${aStats.gd > 0 ? '+' : ''}${aStats.gd}</td></tr>
                    <tr><td style="color:var(--text2)">\u041E\u0447\u043A\u0438</td><td><b>${hStats.pts}</b></td><td><b>${aStats.pts}</b></td></tr>
                </table>
            </div>`;
        }

        // H2H for confidence/verdict
        const h2hAll = (data.finished || []).filter(m =>
            (m.homeTeam.id === home.id && m.awayTeam.id === away.id) ||
            (m.homeTeam.id === away.id && m.awayTeam.id === home.id)
        ).sort((a, b) => new Date(b.utcDate) - new Date(a.utcDate)).slice(0, 3);

        // Confidence rating
        const confidence = calcConfidence(outcomes, hElo, aElo, homeForm, awayForm, matchOdds, h2hAll, home.id);
        const confCls = confidence >= 8 ? 'conf-high' : confidence >= 5 ? 'conf-mid' : 'conf-low';
        const confLabel = confidence >= 8 ? '\u0423\u0432\u0435\u0440\u0435\u043D\u043D\u043E' : confidence >= 5 ? '\u0421\u0440\u0435\u0434\u043D\u0435' : '\u0420\u0438\u0441\u043A\u043E\u0432\u0430\u043D\u043D\u043E';

        // Render
        $('#predBody').innerHTML = `
            <div class="pred-teams">
                <div class="pred-team">
                    <img src="${home.crest || ''}" alt="" onerror="this.style.display='none'">
                    <div class="pred-team-name">${home.name}</div>
                </div>
                <div class="pred-vs">VS</div>
                <div class="pred-team">
                    <img src="${away.crest || ''}" alt="" onerror="this.style.display='none'">
                    <div class="pred-team-name">${away.name}</div>
                </div>
            </div>

            <div class="confidence-wrap">
                <div class="confidence-circle ${confCls}">${confidence}</div>
                <div class="confidence-text">
                    <div class="confidence-label ${confCls}">${confLabel}</div>
                    <div style="color:var(--text2);font-size:12px">\u0420\u0435\u0439\u0442\u0438\u043D\u0433 \u0443\u0432\u0435\u0440\u0435\u043D\u043D\u043E\u0441\u0442\u0438 \u0438\u0437 10</div>
                </div>
            </div>

            <div class="pred-section">
                <div class="pred-section-title">\u0418\u0441\u0445\u043E\u0434 \u043C\u0430\u0442\u0447\u0430 (1X2)</div>
                <div style="display:flex;gap:8px;margin-bottom:8px">
                    <div style="flex:1;text-align:center;padding:12px;background:var(--card);border-radius:8px">
                        <div style="font-size:12px;color:var(--text2)">\u041F\u043E\u0431\u0435\u0434\u0430 1</div>
                        <div style="font-size:22px;font-weight:700" class="${probColor(outcomes.p1)}">${Math.round(outcomes.p1*100)}%</div>
                    </div>
                    <div style="flex:1;text-align:center;padding:12px;background:var(--card);border-radius:8px">
                        <div style="font-size:12px;color:var(--text2)">\u041D\u0438\u0447\u044C\u044F</div>
                        <div style="font-size:22px;font-weight:700" class="${probColor(outcomes.pX)}">${Math.round(outcomes.pX*100)}%</div>
                    </div>
                    <div style="flex:1;text-align:center;padding:12px;background:var(--card);border-radius:8px">
                        <div style="font-size:12px;color:var(--text2)">\u041F\u043E\u0431\u0435\u0434\u0430 2</div>
                        <div style="font-size:22px;font-weight:700" class="${probColor(outcomes.p2)}">${Math.round(outcomes.p2*100)}%</div>
                    </div>
                </div>
                <div class="pred-row">
                    <span class="pred-label">Elo-\u0440\u0435\u0439\u0442\u0438\u043D\u0433 ${home.name}</span>
                    <span class="pred-value">${Math.round(hElo)}</span>
                </div>
                <div class="pred-row">
                    <span class="pred-label">Elo-\u0440\u0435\u0439\u0442\u0438\u043D\u0433 ${away.name}</span>
                    <span class="pred-value">${Math.round(aElo)}</span>
                </div>
            </div>

            <div class="pred-section">
                <div class="pred-section-title">\uD83C\uDFAF \u0412\u0435\u0440\u043E\u044F\u0442\u043D\u044B\u0439 \u0441\u0447\u0451\u0442</div>
                <div class="score-chips">
                    ${topScores.map(s => `
                    <div class="score-chip">
                        <div class="score-chip-score">${s.home}:${s.away}</div>
                        <div class="score-chip-prob">${Math.round(s.prob * 100)}%</div>
                    </div>`).join('')}
                </div>
            </div>

            <div class="pred-section">
                <div class="pred-section-title">\u0422\u043E\u0442\u0430\u043B \u0433\u043E\u043B\u043E\u0432</div>
                <div class="pred-row">
                    <span class="pred-label">\u041E\u0436\u0438\u0434\u0430\u0435\u043C\u044B\u0439 \u0442\u043E\u0442\u0430\u043B</span>
                    <span class="pred-value" style="font-size:20px">${totalXG.toFixed(2)}</span>
                </div>
                <div class="pred-row">
                    <span class="pred-label">\u0413\u043E\u043B\u044B ${home.name}</span>
                    <span class="pred-value">${homeXG.toFixed(2)}</span>
                </div>
                <div class="pred-row">
                    <span class="pred-label">\u0413\u043E\u043B\u044B ${away.name}</span>
                    <span class="pred-value">${awayXG.toFixed(2)}</span>
                </div>
                <div style="margin-top:12px">
                    ${renderProbBar('\u0422\u0411 1.5', pOver15)}
                    ${renderProbBar('\u0422\u0411 2.5', pOver25)}
                    ${renderProbBar('\u0422\u0411 3.5', pOver35)}
                </div>
            </div>

            <div class="pred-section">
                <div class="pred-section-title">\u041E\u0431\u0435 \u0437\u0430\u0431\u044C\u044E\u0442 (BTTS)</div>
                ${renderProbBar('\u041E\u0431\u0435 \u0437\u0430\u0431\u044C\u044E\u0442 \u2014 \u0414\u0410', pBtts)}
                ${renderProbBar('\u041E\u0431\u0435 \u0437\u0430\u0431\u044C\u044E\u0442 \u2014 \u041D\u0415\u0422', 1 - pBtts)}
            </div>

            <div class="pred-section">
                <div class="pred-section-title">\u0410\u0437\u0438\u0430\u0442\u0441\u043A\u0438\u0439 \u0433\u0430\u043D\u0434\u0438\u043A\u0430\u043F</div>
                ${renderAsianHandicap(homeXG, awayXG, rho, home.name, away.name)}
            </div>

            <div class="pred-section">
                <div class="pred-section-title">\u0424\u043E\u0440\u043C\u0430 (\u043F\u043E\u0441\u043B\u0435\u0434\u043D\u0438\u0435 \u043C\u0430\u0442\u0447\u0438)</div>
                <div style="margin-bottom:12px">
                    <div class="pred-row">
                        <span class="pred-label">${home.name}</span>
                        <div class="form-row">${formHtml(homeForm)}</div>
                    </div>
                    <div class="form-split">
                        <div class="form-split-group">
                            <span class="form-split-label">\uD83C\uDFE0 \u0414\u043E\u043C\u0430</span>
                            <div class="form-row">${formHtml(homeFormSplit.home)}</div>
                        </div>
                        <div class="form-split-group">
                            <span class="form-split-label">\u2708\uFE0F \u0412 \u0433\u043E\u0441\u0442\u044F\u0445</span>
                            <div class="form-row">${formHtml(homeFormSplit.away)}</div>
                        </div>
                    </div>
                </div>
                <div>
                    <div class="pred-row">
                        <span class="pred-label">${away.name}</span>
                        <div class="form-row">${formHtml(awayForm)}</div>
                    </div>
                    <div class="form-split">
                        <div class="form-split-group">
                            <span class="form-split-label">\uD83C\uDFE0 \u0414\u043E\u043C\u0430</span>
                            <div class="form-row">${formHtml(awayFormSplit.home)}</div>
                        </div>
                        <div class="form-split-group">
                            <span class="form-split-label">\u2708\uFE0F \u0412 \u0433\u043E\u0441\u0442\u044F\u0445</span>
                            <div class="form-row">${formHtml(awayFormSplit.away)}</div>
                        </div>
                    </div>
                </div>
                <p style="font-size:11px;color:var(--text2);margin-top:8px">\u0412 \u2014 \u043F\u043E\u0431\u0435\u0434\u0430, \u041D \u2014 \u043D\u0438\u0447\u044C\u044F, \u041F \u2014 \u043F\u043E\u0440\u0430\u0436\u0435\u043D\u0438\u0435</p>
            </div>

            ${statsHTML}
            ${h2hHTML}

            ${renderMarketVsModel(outcomes, matchOdds)}

            ${renderOddsHTML(matchOdds, outcomes, oddsData)}

            ${renderKellyHTML(outcomes, matchOdds)}

            ${renderVerdictHTML(outcomes, hElo, aElo, homeForm, awayForm, matchOdds, h2hAll, home.id, away.id)}

            <a class="fonbet-btn" href="${fonbetUrl()}" target="_blank" rel="noopener">
                &#9917; \u0421\u0442\u0430\u0432\u0438\u0442\u044C \u0432 \u0424\u043E\u043D\u0431\u0435\u0442: ${ruName(home.name)} \u2014 ${ruName(away.name)}
            </a>
            <a href="${fonbetSearchUrl(ruName(home.name), ruName(away.name))}" target="_blank" rel="noopener"
               style="display:block;text-align:center;font-size:12px;color:var(--text2);margin-top:4px;margin-bottom:12px;text-decoration:underline">\u041D\u0430\u0439\u0442\u0438 \u043C\u0430\u0442\u0447 \u0432 \u042F\u043D\u0434\u0435\u043A\u0441\u0435</a>

            <p style="font-size:11px;color:var(--text2);text-align:center;margin-top:16px">
\u041C\u043E\u0434\u0435\u043B\u044C: Dixon-Coles + Elo. \u0423\u0447\u0438\u0442\u044B\u0432\u0430\u0435\u0442 \u0441\u0438\u043B\u0443 \u0430\u0442\u0430\u043A\u0438/\u0437\u0430\u0449\u0438\u0442\u044B, \u0434\u043E\u043C\u0430\u0448\u043D\u0435\u0435 \u043F\u0440\u0435\u0438\u043C\u0443\u0449\u0435\u0441\u0442\u0432\u043E, \u043A\u043E\u0440\u0440\u0435\u043B\u044F\u0446\u0438\u044E \u043D\u0438\u0437\u043A\u0438\u0445 \u0441\u0447\u0435\u0442\u043E\u0432 \u0438 \u0434\u0438\u043D\u0430\u043C\u0438\u043A\u0443 \u0444\u043E\u0440\u043C\u044B. \u042D\u0442\u043E \u043C\u0430\u0442\u0435\u043C\u0430\u0442\u0438\u0447\u0435\u0441\u043A\u0430\u044F \u043E\u0446\u0435\u043D\u043A\u0430, \u0430 \u043D\u0435 \u0433\u0430\u0440\u0430\u043D\u0442\u0438\u044F.
            </p>
        `;
    }

    // ==================== ODDS RENDERING ====================
    function renderOddsHTML(odds, modelOutcomes, oddsData) {
        if (!odds) return '';

        let html = '';
        const h2h = odds.h2h || {};
        const totals = odds.totals || {};
        const btts = odds.btts || {};

        // === ARBITRAGE / VALUE BETS ALERTS ===
        let arbHTML = '';
        if (h2h.arb) {
            const profit = Math.abs(h2h.margin * 100).toFixed(1);
            arbHTML = `
            <div class="arb-alert">
                <div class="arb-alert-icon">&#9889;</div>
                <div class="arb-alert-text">
                    <div class="arb-alert-title">\u0412\u0418\u041B\u041A\u0410 \u041D\u0410\u0419\u0414\u0415\u041D\u0410 (1X2) \u2014 ${profit}% \u043F\u0440\u0438\u0431\u044B\u043B\u044C</div>
                    <div class="arb-alert-detail">\u041F1: ${h2h.bestBk.home} (${h2h.best.home}) | \u041D: ${h2h.bestBk.draw} (${h2h.best.draw}) | \u041F2: ${h2h.bestBk.away} (${h2h.best.away})</div>
                </div>
            </div>`;
        } else if (h2h.margin !== null && h2h.margin !== undefined && h2h.margin < 0.02) {
            arbHTML = `
            <div class="arb-alert arb-near">
                <div class="arb-alert-icon">&#9888;&#65039;</div>
                <div class="arb-alert-text">
                    <div class="arb-alert-title">\u041F\u043E\u0447\u0442\u0438 \u0432\u0438\u043B\u043A\u0430 (1X2) \u2014 \u043C\u0430\u0440\u0436\u0430 ${(h2h.margin * 100).toFixed(1)}%</div>
                    <div class="arb-alert-detail">\u041B\u0443\u0447\u0448\u0438\u0435: \u041F1 ${h2h.best.home} | \u041D ${h2h.best.draw} | \u041F2 ${h2h.best.away}</div>
                </div>
            </div>`;
        }

        if (totals.arb) {
            const profit = Math.abs(totals.margin * 100).toFixed(1);
            arbHTML += `
            <div class="arb-alert" style="margin-top:8px">
                <div class="arb-alert-icon">&#9889;</div>
                <div class="arb-alert-text">
                    <div class="arb-alert-title">\u0412\u0418\u041B\u041A\u0410 \u041D\u0410\u0419\u0414\u0415\u041D\u0410 (\u0422\u043E\u0442\u0430\u043B ${totals.point}) \u2014 ${profit}% \u043F\u0440\u0438\u0431\u044B\u043B\u044C</div>
                    <div class="arb-alert-detail">\u0422\u0411: ${totals.bestBk.over} (${totals.best.over}) | \u0422\u041C: ${totals.bestBk.under} (${totals.best.under})</div>
                </div>
            </div>`;
        }

        // === VALUE BETS ===
        let valueBetsHTML = '';
        if (modelOutcomes && h2h.best && h2h.best.home > 0) {
            const valueBets = [];
            const checks = [
                { label: '\u041F\u043E\u0431\u0435\u0434\u0430 1', modelP: modelOutcomes.p1, odds: h2h.best.home },
                { label: '\u041D\u0438\u0447\u044C\u044F', modelP: modelOutcomes.pX, odds: h2h.best.draw },
                { label: '\u041F\u043E\u0431\u0435\u0434\u0430 2', modelP: modelOutcomes.p2, odds: h2h.best.away },
            ];
            for (const c of checks) {
                const impliedP = 1 / c.odds;
                const ev = c.modelP * c.odds - 1; // Expected Value
                if (ev > 0.08) {
                    valueBets.push({
                        label: c.label,
                        modelP: c.modelP,
                        impliedP: impliedP,
                        odds: c.odds,
                        ev: ev
                    });
                }
            }
            if (valueBets.length > 0) {
                valueBetsHTML = valueBets.map(vb => `
                <div class="value-bet">
                    <div class="value-bet-label">&#127919; VALUE BET: ${vb.label}</div>
                    <div class="value-bet-text">
                        \u041C\u043E\u0434\u0435\u043B\u044C: <b>${Math.round(vb.modelP*100)}%</b> |
                        \u0411\u0443\u043A\u043C\u0435\u043A\u0435\u0440: ${Math.round(vb.impliedP*100)}% (\u043A\u043E\u044D\u0444. ${vb.odds.toFixed(2)}) |
                        \u041F\u0440\u0435\u0438\u043C\u0443\u0449\u0435\u0441\u0442\u0432\u043E: <span class="value-bet-edge">+${(vb.ev*100).toFixed(1)}%</span>
                    </div>
                </div>`).join('');
            }
        }

        // === 1X2 ODDS TABLE ===
        let h2hTableHTML = '';
        if (h2h.bookmakers && h2h.bookmakers.length > 0) {
            const rows = h2h.bookmakers.map(bk => {
                const hBest = h2h.best && bk.home >= h2h.best.home ? ' odds-best' : '';
                const dBest = h2h.best && bk.draw >= h2h.best.draw ? ' odds-best' : '';
                const aBest = h2h.best && bk.away >= h2h.best.away ? ' odds-best' : '';
                return `<tr>
                    <td>${bk.title}</td>
                    <td class="${hBest}">${bk.home.toFixed(2)}</td>
                    <td class="${dBest}">${bk.draw.toFixed(2)}</td>
                    <td class="${aBest}">${bk.away.toFixed(2)}</td>
                </tr>`;
            }).join('');

            h2hTableHTML = `
            <table class="odds-table">
                <tr><th>\u0411\u0443\u043A\u043C\u0435\u043A\u0435\u0440</th><th>\u041F1</th><th>\u041D\u0438\u0447\u044C\u044F</th><th>\u041F2</th></tr>
                ${rows}
                <tr class="odds-best-row">
                    <td>\u041B\u0443\u0447\u0448\u0438\u0435</td>
                    <td class="odds-best">${h2h.best.home.toFixed(2)}</td>
                    <td class="odds-best">${h2h.best.draw.toFixed(2)}</td>
                    <td class="odds-best">${h2h.best.away.toFixed(2)}</td>
                </tr>
            </table>`;
            if (h2h.margin !== null && h2h.margin !== undefined && !h2h.arb) {
                h2hTableHTML += `<div class="arb-normal">\u041C\u0430\u0440\u0436\u0430 \u0431\u0443\u043A\u043C\u0435\u043A\u0435\u0440\u043E\u0432: ${(h2h.margin * 100).toFixed(1)}%</div>`;
            }
        }

        // === TOTALS ODDS TABLE ===
        let totalsTableHTML = '';
        if (totals.bookmakers && totals.bookmakers.length > 0) {
            const point = totals.point || 2.5;
            const rows = totals.bookmakers.map(bk => {
                const oBest = totals.best && bk.over >= totals.best.over ? ' odds-best' : '';
                const uBest = totals.best && bk.under >= totals.best.under ? ' odds-best' : '';
                return `<tr>
                    <td>${bk.title}</td>
                    <td class="${oBest}">${bk.over.toFixed(2)}</td>
                    <td class="${uBest}">${bk.under.toFixed(2)}</td>
                </tr>`;
            }).join('');

            totalsTableHTML = `
            <table class="odds-table">
                <tr><th>\u0411\u0443\u043A\u043C\u0435\u043A\u0435\u0440</th><th>\u0422\u0411 ${point}</th><th>\u0422\u041C ${point}</th></tr>
                ${rows}
                <tr class="odds-best-row">
                    <td>\u041B\u0443\u0447\u0448\u0438\u0435</td>
                    <td class="odds-best">${totals.best.over.toFixed(2)}</td>
                    <td class="odds-best">${totals.best.under.toFixed(2)}</td>
                </tr>
            </table>`;
            if (totals.margin !== null && totals.margin !== undefined && !totals.arb) {
                totalsTableHTML += `<div class="arb-normal">\u041C\u0430\u0440\u0436\u0430 \u0431\u0443\u043A\u043C\u0435\u043A\u0435\u0440\u043E\u0432: ${(totals.margin * 100).toFixed(1)}%</div>`;
            }
        }

        // === COMPOSE ===
        const freshness = oddsData && oddsData.updated ? freshPanel(oddsData.updated) : '';

        html = `
        <div class="pred-section">
            <div class="pred-section-title">\u041A\u043E\u044D\u0444\u0444\u0438\u0446\u0438\u0435\u043D\u0442\u044B \u0431\u0443\u043A\u043C\u0435\u043A\u0435\u0440\u043E\u0432</div>
            ${freshness}
            ${arbHTML}
            ${valueBetsHTML}
            ${h2hTableHTML && regionMode === 'ru' ? '<div style="margin-bottom:8px;padding:10px 14px;background:#2a2000;border:1px solid #aa8800;border-radius:8px;font-size:12px;color:#eec600;line-height:1.5">\u26A0\uFE0F \u041A\u043E\u044D\u0444\u0444\u0438\u0446\u0438\u0435\u043D\u0442\u044B \u043E\u0442 \u043C\u0435\u0436\u0434\u0443\u043D\u0430\u0440\u043E\u0434\u043D\u044B\u0445 \u0431\u0443\u043A\u043C\u0435\u043A\u0435\u0440\u043E\u0432. \u0414\u043B\u044F \u0441\u0442\u0430\u0432\u043E\u043A \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u0443\u0439\u0442\u0435 \u043B\u0438\u0446\u0435\u043D\u0437\u0438\u0440\u043E\u0432\u0430\u043D\u043D\u044B\u0445 \u0440\u043E\u0441\u0441\u0438\u0439\u0441\u043A\u0438\u0445 \u0431\u0443\u043A\u043C\u0435\u043A\u0435\u0440\u043E\u0432 (\u0424\u043E\u043D\u0431\u0435\u0442, \u041B\u0438\u0433\u0430 \u0421\u0442\u0430\u0432\u043E\u043A, 1\u0445\u0421\u0442\u0430\u0432\u043A\u0430, Winline).</div>' : ''}
            ${h2hTableHTML ? '<div style="margin-bottom:16px">' + h2hTableHTML + '</div>' : ''}
            ${totalsTableHTML}
            ${(() => {
                if (!btts.bookmakers || btts.bookmakers.length === 0) return '';
                const rows = btts.bookmakers.map(bk => {
                    const yBest = btts.best && bk.yes >= btts.best.yes ? ' odds-best' : '';
                    const nBest = btts.best && bk.no >= btts.best.no ? ' odds-best' : '';
                    return `<tr><td>${bk.title}</td><td class="${yBest}">${bk.yes.toFixed(2)}</td><td class="${nBest}">${bk.no.toFixed(2)}</td></tr>`;
                }).join('');
                const marginLine = (btts.margin !== null && btts.margin !== undefined && !btts.arb)

    function renderMarketVsModel(outcomes, matchOdds) {
        if (!matchOdds || !matchOdds.h2h || !matchOdds.h2h.best) return '';
        const best = matchOdds.h2h.best;
        if (!best.home || !best.draw || !best.away) return '';

        // Market implied probabilities (remove margin)
        const rawSum = 1/best.home + 1/best.draw + 1/best.away;
        const mktP1 = (1/best.home) / rawSum;
        const mktPX = (1/best.draw) / rawSum;
        const mktP2 = (1/best.away) / rawSum;

        const items = [
            { label: '\u041F1', market: mktP1, model: outcomes.p1, color: '#4fc3f7' },
            { label: '\u0425', market: mktPX, model: outcomes.pX, color: '#ffb74d' },
            { label: '\u041F2', label2: '\u041F2', market: mktP2, model: outcomes.p2, color: '#e57373' }
        ];

        const rows = items.map(it => {
            const mktPct = Math.round(it.market * 100);
            const modPct = Math.round(it.model * 100);
            const edge = it.model - it.market;
            const edgePct = Math.round(edge * 100);
            const edgeHTML = Math.abs(edgePct) >= 3
                ? `<span class="mvm-edge ${edge > 0 ? 'mvm-edge-pos' : 'mvm-edge-neg'}">${edge > 0 ? '+' : ''}${edgePct}%</span>`
                : '';
            return `<div class="mvm-row">
                <div class="mvm-label"><b>${it.label}</b></div>
                <div class="mvm-bars">
                    <div class="mvm-bar-market" style="width:${mktPct}%;background:${it.color}"></div>
                    <div class="mvm-bar-model" style="width:${modPct}%;background:${it.color}"></div>
                </div>
                <div class="mvm-pct">${modPct}%${edgeHTML}</div>
            </div>`;
        }).join('');

        return `
        <div class="pred-section">
            <div class="pred-section-title">\u{1F4CA} \u0420\u044B\u043D\u043E\u043A vs \u041C\u043E\u0434\u0435\u043B\u044C</div>
            <div class="mvm-box">
                <div class="mvm-title">\u041A\u0443\u0434\u0430 \u0441\u0442\u0430\u0432\u044F\u0442 \u043B\u044E\u0434\u0438 vs \u0447\u0442\u043E \u0433\u043E\u0432\u043E\u0440\u0438\u0442 \u043C\u0430\u0442\u0435\u043C\u0430\u0442\u0438\u043A\u0430</div>
                ${rows}
                <div class="mvm-legend">
                    <span><span class="mvm-dot" style="background:#888;opacity:0.7"></span>\u0420\u044B\u043D\u043E\u043A (\u043A\u0443\u0434\u0430 \u0441\u0442\u0430\u0432\u044F\u0442)</span>
                    <span><span class="mvm-dot" style="background:#fff"></span>\u041C\u043E\u0434\u0435\u043B\u044C (\u043C\u0430\u0442\u0435\u043C\u0430\u0442\u0438\u043A\u0430)</span>
                    <span><span class="mvm-edge mvm-edge-pos">+N%</span> = value bet</span>
                </div>
                <p style="font-size:11px;color:var(--text2);margin-top:8px;line-height:1.5">
                    \u0415\u0441\u043B\u0438 \u043C\u043E\u0434\u0435\u043B\u044C \u0434\u0430\u0451\u0442 <b>\u0431\u043E\u043B\u044C\u0448\u0435</b>, \u0447\u0435\u043C \u0440\u044B\u043D\u043E\u043A \u2014 \u044D\u0442\u043E <b>value bet</b> (\u0437\u0435\u043B\u0451\u043D\u044B\u0439 \u0431\u0435\u0439\u0434\u0436).
                    \u0420\u044B\u043D\u043E\u043A \u043D\u0435\u0434\u043E\u043E\u0446\u0435\u043D\u0438\u0432\u0430\u0435\u0442 \u044D\u0442\u043E\u0442 \u0438\u0441\u0445\u043E\u0434, \u0430 \u0437\u043D\u0430\u0447\u0438\u0442 \u043A\u043E\u044D\u0444\u0444\u0438\u0446\u0438\u0435\u043D\u0442 \u0437\u0430\u0432\u044B\u0448\u0435\u043D \u2014 \u0432\u044B\u0433\u043E\u0434\u043D\u0430\u044F \u0441\u0442\u0430\u0432\u043A\u0430.
                </p>
            </div>
        </div>`;
    }

    function renderProbBar(label, prob) {
        const p = Math.round(prob * 100);
        const cls = probColor(prob);
        const color = barColor(prob);
        return `
        <div class="prob-bar">
            <span class="pred-label" style="min-width:140px">${label}</span>
            <div class="prob-bar-track">
                <div class="prob-bar-fill" style="width:${p}%;background:${color}"></div>
            </div>
            <span class="prob-bar-label ${cls}">${p}%</span>
        </div>`;
    }

    // Asian Handicap from Dixon-Coles score matrix
    function renderAsianHandicap(hLam, aLam, rho, homeName, awayName) {
        const mat = scoreMatrix(hLam, aLam, rho, 8);
        const handicaps = [-0.5, -1.5, -2.5, 0.5, 1.5];
        const rows = [];
        for (const hc of handicaps) {
            // Handicap applied to home team: home wins if (homeGoals + hc) > awayGoals
            let pWin = 0;
            for (let h = 0; h <= 8; h++) {
                for (let a = 0; a <= 8; a++) {
                    if (h + hc > a) pWin += mat[h][a];
                }
            }
            const label = hc > 0 ? `${homeName} +${hc}` : `${homeName} ${hc}`;
            rows.push({ label, prob: pWin, hc });
        }
        // Also add away team handicaps
        const awayHandicaps = [-0.5, -1.5];
        for (const hc of awayHandicaps) {
            let pWin = 0;
            for (let h = 0; h <= 8; h++) {
                for (let a = 0; a <= 8; a++) {
                    if (a + Math.abs(hc) > h) pWin += mat[h][a]; // away + handicap > home
                }
            }
            const label = `${awayName} ${hc}`;
            rows.push({ label, prob: pWin, hc: -hc }); // sort key
        }
        // Sort: most relevant first (closest to 50%)
        rows.sort((a, b) => Math.abs(a.prob - 0.5) - Math.abs(b.prob - 0.5));
        return rows.map(r => renderProbBar(`\u0424\u043E\u0440\u0430 ${r.label}`, r.prob)).join('');
    }

    // Kelly criterion calculator HTML
    function renderKellyHTML(modelOutcomes, matchOdds) {
        if (!matchOdds || !matchOdds.h2h || !matchOdds.h2h.best) return '';
        const best = matchOdds.h2h.best;
        const labels = ['\u041F\u043E\u0431\u0435\u0434\u0430 1', '\u041D\u0438\u0447\u044C\u044F', '\u041F\u043E\u0431\u0435\u0434\u0430 2'];
        const probs = [modelOutcomes.p1, modelOutcomes.pX, modelOutcomes.p2];
        const odds = [best.home, best.draw, best.away];
        const rows = [];
        for (let i = 0; i < 3; i++) {
            if (odds[i] <= 0) continue;
            const b = odds[i] - 1;
            const p = probs[i];
            const q = 1 - p;
            const f = (b * p - q) / b;
            const kelly = Math.min(f * 0.5, 0.05); // fractional Kelly 50%, capped at 5%
            if (kelly > 0.01) {
                rows.push(`<div class="kelly-row">
                    <span>${labels[i]} (\u043A\u043E\u044D\u0444. ${odds[i].toFixed(2)})</span>
                    <span class="kelly-value">${(kelly * 100).toFixed(1)}% \u0431\u0430\u043D\u043A\u0430</span>
                </div>`);
            }
        }
        if (!rows.length) return '';
        return `<div class="kelly-calc">
            <div class="kelly-title">\uD83D\uDCB0 \u041A\u0430\u043B\u044C\u043A\u0443\u043B\u044F\u0442\u043E\u0440 \u0441\u0442\u0430\u0432\u043A\u0438 (\u041A\u0435\u043B\u043B\u0438 50%)</div>
            ${rows.join('')}
            <div style="font-size:11px;color:var(--text2);margin-top:6px">\u041C\u0430\u043A\u0441\u0438\u043C\u0443\u043C 5% \u0431\u0430\u043D\u043A\u0430 \u043D\u0430 \u043E\u0434\u043D\u0443 \u0441\u0442\u0430\u0432\u043A\u0443</div>
        </div>`;
    }

    // Verdict (BET / CAUTION / SKIP) with checklist
    function renderVerdictHTML(outcomes, hElo, aElo, homeFormAll, awayFormAll, matchOdds, h2hMatches, homeId, awayId) {
        const checks = [];
        const maxP = Math.max(outcomes.p1, outcomes.pX, outcomes.p2);
        const favLabel = outcomes.p1 >= outcomes.p2 ? '\u041F\u043E\u0431\u0435\u0434\u0430 1' : outcomes.p2 > outcomes.p1 ? '\u041F\u043E\u0431\u0435\u0434\u0430 2' : '\u041D\u0438\u0447\u044C\u044F';

        // 1. Уверенность модели
        checks.push({ pass: maxP > 0.55, text: `\u041C\u043E\u0434\u0435\u043B\u044C \u0434\u0430\u0451\u0442 ${Math.round(maxP*100)}% \u043D\u0430 ${favLabel}` });

        // 2. Value bet с учётом нормированного рынка
        let hasValue = false;
        let valueText = 'Value bet \u043D\u0430\u0439\u0434\u0435\u043D';
        if (matchOdds && matchOdds.h2h && matchOdds.h2h.best) {
            const best = matchOdds.h2h.best;
            const ps = [outcomes.p1, outcomes.pX, outcomes.p2];
            const os = [best.home, best.draw, best.away];
            let invSum = 0;
            for (const o of os) if (o > 0) invSum += 1 / o;
            for (let i = 0; i < 3; i++) {
                if (os[i] > 0 && invSum > 0) {
                    const pMarket = (1 / os[i]) / invSum;
                    const ev = ps[i] * os[i] - 1;
                    if (ps[i] - pMarket > 0.08 && ev > 0.03) { hasValue = true; break; }
                }
            }
        }
        checks.push({ pass: hasValue, text: valueText + ' (\u043C\u043E\u0434\u0435\u043B\u044C > \u0440\u044B\u043D\u043A\u0430 \u043D\u0430 8\u043F.\u043F.)' });

        // 3. Асимметрия формы фаворит vs андердог
        const favForm = outcomes.p1 >= outcomes.p2 ? homeFormAll : awayFormAll;
        const undForm = outcomes.p1 >= outcomes.p2 ? awayFormAll : homeFormAll;
        const wins = favForm.filter(r => r === 'W').length;
        const undWins = undForm.filter(r => r === 'W').length;
        const formGap = wins - undWins;
        checks.push({ pass: formGap >= 2, text: `\u0424\u043E\u0440\u043C\u0430: \u0444\u0430\u0432\u043E\u0440\u0438\u0442 ${wins}\u043F, \u0430\u043D\u0434\u0435\u0440\u0434\u043E\u0433 ${undWins}\u043F (\u0440\u0430\u0437\u0440\u044B\u0432 \u2265 2)` });

        const passed = checks.filter(c => c.pass).length;
        let cls, title, subtitle;
        if (passed === 3 && hasValue) {
            cls = 'verdict-bet';
            title = '\uD83D\uDFE2 \u0421\u0422\u0410\u0412\u042C';
            subtitle = `\u0412\u0441\u0435 3 \u0444\u0430\u043A\u0442\u043E\u0440\u0430 \u2014 \u0441\u0438\u0433\u043D\u0430\u043B \u043D\u0430 ${favLabel}`;
        } else if (passed >= 2) {
            cls = 'verdict-caution';
            title = '\uD83D\uDFE1 \u041E\u0421\u0422\u041E\u0420\u041E\u0416\u041D\u041E';
            subtitle = `${passed} \u0438\u0437 3 \u0444\u0430\u043A\u0442\u043E\u0440\u043E\u0432 \u2014 \u0440\u0438\u0441\u043A \u043F\u043E\u0432\u044B\u0448\u0435\u043D`;
        } else {
            cls = 'verdict-skip';
            title = '\uD83D\uDD34 \u041F\u0420\u041E\u041F\u0423\u0421\u0422\u0418';
            subtitle = `${passed} \u0438\u0437 3 \u0444\u0430\u043A\u0442\u043E\u0440\u043E\u0432 \u2014 \u043D\u0435\u0434\u043E\u0441\u0442\u0430\u0442\u043E\u0447\u043D\u043E`;
        }

        const checklistHTML = checks.map(c =>
            `<div class="verdict-check ${c.pass ? 'verdict-pass' : 'verdict-fail'}">${c.pass ? '\u2705' : '\u274C'} ${c.text}</div>`
        ).join('');

        return `
        <div class="verdict-box ${cls}">
            <div class="verdict-title">${title}</div>
            <div class="verdict-subtitle">${subtitle}</div>
            <div class="verdict-checklist">${checklistHTML}</div>
        </div>`;
    }

        }

        document.querySelector('.modal-body').innerHTML = html;
