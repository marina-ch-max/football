<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Футбольные Прогнозы</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0d1117; --bg2: #161b22; --card: #1c2333; --hover: #242d3d;
            --green: #00e676; --red: #ff5252; --yellow: #ffd740; --blue: #448aff;
            --text: #e6edf3; --text2: #8b949e; --border: #30363d; --radius: 12px;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; padding: 16px; }
        h1 { font-size: 24px; margin-bottom: 8px; }

        /* Setup */
        .setup { max-width: 600px; margin: 60px auto; padding: 32px; background: var(--bg2); border-radius: var(--radius); border: 1px solid var(--border); }
        .setup h1 { text-align: center; margin-bottom: 24px; font-size: 28px; }
        .step { display: flex; gap: 12px; margin-bottom: 20px; padding: 16px; background: var(--card); border-radius: 8px; }
        .step-num { width: 32px; height: 32px; border-radius: 50%; background: var(--blue); display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; font-size: 14px; }
        .step-text { font-size: 14px; line-height: 1.5; }
        .step-text a { color: var(--blue); text-decoration: none; }
        .step-text a:hover { text-decoration: underline; }
        .key-input { display: flex; gap: 8px; margin-top: 24px; }
        .key-input input { flex: 1; padding: 12px 16px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 15px; outline: none; }
        .key-input input:focus { border-color: var(--blue); }
        .key-input input::placeholder { color: var(--text2); }

        /* Buttons */
        .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: var(--blue); color: #fff; }
        .btn-primary:hover { background: #5c9aff; }
        .btn-green { background: var(--green); color: #000; }
        .btn-green:hover { background: #33eb91; }
        .btn-sm { padding: 6px 14px; font-size: 13px; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Header */
        .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; flex-wrap: wrap; gap: 8px; }
        .header-right { font-size: 12px; color: var(--text2); }
        .reset-key { color: var(--text2); cursor: pointer; font-size: 12px; text-decoration: underline; background: none; border: none; }

        /* Leagues */
        .leagues { display: flex; gap: 6px; overflow-x: auto; padding: 8px 0 16px; -webkit-overflow-scrolling: touch; }
        .leagues::-webkit-scrollbar { height: 4px; }
        .leagues::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        .league-btn { padding: 8px 16px; background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; color: var(--text2); cursor: pointer; white-space: nowrap; font-size: 13px; transition: all 0.2s; }
        .league-btn:hover { background: var(--card); color: var(--text); }
        .league-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }

        /* Matches */
        .matches { display: flex; flex-direction: column; gap: 8px; }
        .match-card { display: flex; align-items: center; gap: 12px; padding: 16px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; transition: all 0.2s; }
        .match-card:hover { background: var(--card); border-color: var(--blue); }
        .match-date { font-size: 12px; color: var(--text2); min-width: 50px; text-align: center; line-height: 1.3; }
        .match-teams { flex: 1; display: flex; flex-direction: column; gap: 6px; }
        .match-team { display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .match-team img { width: 24px; height: 24px; object-fit: contain; }

        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: flex-start; justify-content: center; overflow-y: auto; padding: 20px; }
        .modal { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); width: 100%; max-width: 700px; margin: 20px auto; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border-bottom: 1px solid var(--border); }
        .modal-header h2 { font-size: 16px; color: var(--text); margin: 0; }
        .modal-close { background: none; border: none; color: var(--text2); font-size: 24px; cursor: pointer; padding: 4px 8px; }
        .modal-close:hover { color: var(--text); }
        .modal-body { padding: 24px; }

        /* Prediction sections */
        .pred-teams { display: flex; align-items: center; justify-content: center; gap: 24px; padding: 20px; margin-bottom: 20px; background: var(--bg2); border-radius: var(--radius); }
        .pred-team { text-align: center; }
        .pred-team img { width: 56px; height: 56px; object-fit: contain; margin-bottom: 8px; }
        .pred-team-name { font-size: 14px; font-weight: 600; }
        .pred-vs { font-size: 20px; font-weight: 700; color: var(--text2); }

        .pred-section { margin-bottom: 20px; }
        .pred-section-title { font-size: 14px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }

        .pred-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; }
        .pred-label { font-size: 14px; color: var(--text2); }
        .pred-value { font-size: 14px; font-weight: 600; }

        .prob-bar { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
        .prob-bar-track { flex: 1; height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; }
        .prob-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
        .prob-bar-label { font-size: 13px; min-width: 45px; text-align: right; font-weight: 600; }
        .prob-high { color: var(--green); }
        .prob-mid { color: var(--yellow); }
        .prob-low { color: var(--red); }

        .form-row { display: flex; gap: 4px; }
        .form-item { width: 28px; height: 28px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
        .form-W { background: #1b5e20; color: var(--green); }
        .form-D { background: #4e342e; color: var(--yellow); }
        .form-L { background: #b71c1c; color: var(--red); }

        .h2h-match { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
        .h2h-match:last-child { border-bottom: none; }
        .h2h-score { font-weight: 700; min-width: 40px; text-align: center; }
        .h2h-date { color: var(--text2); min-width: 80px; }
        .h2h-teams { flex: 1; }

        .shots-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .shots-table th { text-align: left; padding: 8px; color: var(--text2); font-weight: 600; border-bottom: 1px solid var(--border); }
        .shots-table td { padding: 8px; border-bottom: 1px solid var(--border); }
        .shots-table tr:last-child td { border-bottom: none; }

        /* Loading */
        .loading { text-align: center; padding: 40px; color: var(--text2); }
        .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-msg { padding: 16px; background: #2d1515; border: 1px solid var(--red); border-radius: 8px; color: var(--red); font-size: 14px; margin: 12px 0; }
        .empty-msg { text-align: center; padding: 40px; color: var(--text2); font-size: 14px; }
        .info-msg { padding: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text2); font-size: 12px; margin: 8px 0; }

        @media (max-width: 600px) {
            .container { padding: 8px; }
            .setup { margin: 20px 8px; padding: 20px; }
            .match-card { flex-wrap: wrap; }
            .pred-teams { gap: 12px; flex-wrap: wrap; }
            .pred-team img { width: 40px; height: 40px; }
            .modal { margin: 8px; }
            .modal-body { padding: 16px; }
            .pred-row { flex-wrap: wrap; gap: 4px; }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
    // ==================== CONFIG ====================
    const API_BASE = 'https://api.football-data.org/v4';
    const LEAGUES = [
        { code: 'PL',  name: 'АПЛ',              flag: '\u{1F1EC}\u{1F1E7}' },
        { code: 'PD',  name: 'Ла Лига',           flag: '\u{1F1EA}\u{1F1F8}' },
        { code: 'SA',  name: 'Серия А',            flag: '\u{1F1EE}\u{1F1F9}' },
        { code: 'BL1', name: 'Бундеслига',         flag: '\u{1F1E9}\u{1F1EA}' },
        { code: 'FL1', name: 'Лига 1',             flag: '\u{1F1EB}\u{1F1F7}' },
        { code: 'CL',  name: 'Лига Чемпионов',     flag: '\u2B50' },
    ];

    // ==================== STATE ====================
    const state = {
        token: localStorage.getItem('fdo_token') || '',
        currentLeague: null,
        standingsCache: {},
    };

    // ==================== CACHE ====================
    const cache = {
        get(key) {
            try {
                const raw = sessionStorage.getItem('fc2_' + key);
                if (!raw) return null;
                const { data, exp } = JSON.parse(raw);
                if (Date.now() > exp) { sessionStorage.removeItem('fc2_' + key); return null; }
                return data;
            } catch { return null; }
        },
        set(key, data, ttl) {
            try { sessionStorage.setItem('fc2_' + key, JSON.stringify({ data, exp: Date.now() + ttl })); } catch {}
        }
    };

    // ==================== API ====================
    async function apiCall(endpoint) {
        const cached = cache.get(endpoint);
        if (cached) return cached;

        const headers = {};
        if (state.token) headers['X-Auth-Token'] = state.token;

        const res = await fetch(API_BASE + endpoint, { headers });

        if (res.status === 401 || res.status === 403) throw new Error('AUTH');
        if (res.status === 429) throw new Error('RATE_LIMIT');
        if (!res.ok) throw new Error('HTTP_' + res.status);

        const json = await res.json();
        cache.set(endpoint, json, 15 * 60 * 1000); // 15 min
        return json;
    }

    // ==================== MATH ====================
    function factorial(n) { let r = 1; for (let i = 2; i <= n; i++) r *= i; return r; }
    function poisson(lambda, k) {
        if (lambda <= 0) return k === 0 ? 1 : 0;
        return Math.pow(lambda, k) * Math.exp(-lambda) / factorial(k);
    }
    function probOver(hXG, aXG, threshold) {
        let under = 0;
        for (let t = 0; t <= threshold; t++)
            for (let h = 0; h <= t; h++)
                under += poisson(hXG, h) * poisson(aXG, t - h);
        return Math.min(Math.max(1 - under, 0), 1);
    }
    function probBTTS(hXG, aXG) { return (1 - poisson(hXG, 0)) * (1 - poisson(aXG, 0)); }
    function probColor(p) { return p >= 0.65 ? 'prob-high' : p >= 0.40 ? 'prob-mid' : 'prob-low'; }
    function barColor(p) { return p >= 0.65 ? 'var(--green)' : p >= 0.40 ? 'var(--yellow)' : 'var(--red)'; }

    // ==================== HELPERS ====================
    function $(sel) { return document.querySelector(sel); }
    function formatDate(d) { return new Date(d).toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' }); }
    function formatTime(d) { return new Date(d).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' }); }
    function pct(v) { return Math.round(v * 100) + '%'; }

    function errorText(err) {
        if (err.message === 'AUTH') return 'Нужен API-ключ. Зарегистрируйтесь на football-data.org (бесплатно) и введите ключ.';
        if (err.message === 'RATE_LIMIT') return 'Слишком много запросов. Подождите минуту и попробуйте снова.';
        if (err.message === 'Failed to fetch') return 'Ошибка сети. Проверьте интернет.';
        return 'Ошибка: ' + err.message;
    }

    // ==================== SETUP ====================
    function renderSetup() {
        $('#app').innerHTML = `
        <div class="setup">
            <h1>Футбольные Прогнозы</h1>
            <p style="text-align:center;color:var(--text2);margin-bottom:24px">
                Для работы нужен бесплатный ключ с сайта football-data.org
            </p>
            <div class="step">
                <div class="step-num">1</div>
                <div class="step-text">
                    Откройте <a href="https://www.football-data.org/client/register" target="_blank">football-data.org/client/register</a>
                    и зарегистрируйтесь (имя, email).
                </div>
            </div>
            <div class="step">
                <div class="step-num">2</div>
                <div class="step-text">
                    Вам на почту придёт письмо с <b>API-ключом</b> (API Token). Скопируйте его.
                </div>
            </div>
            <div class="step">
                <div class="step-num">3</div>
                <div class="step-text">
                    Вставьте ключ в поле ниже. Это нужно сделать <b>один раз</b>.
                </div>
            </div>
            <div class="key-input">
                <input id="tokenInput" type="text" placeholder="Вставьте API-ключ..." value="${state.token}">
                <button class="btn btn-primary" onclick="saveToken()">Сохранить</button>
            </div>
            <div id="setupError"></div>
            <p style="margin-top:16px;font-size:12px;color:var(--text2);text-align:center">
                Бесплатно. Доступны: АПЛ, Ла Лига, Серия А, Бундеслига, Лига 1, Лига Чемпионов.
            </p>
        </div>`;
    }

    async function saveToken() {
        const token = $('#tokenInput').value.trim();
        if (!token) return;
        state.token = token;
        localStorage.setItem('fdo_token', token);
        $('#setupError').innerHTML = '<div class="loading"><div class="spinner"></div><br>Проверяю ключ...</div>';
        try {
            await apiCall('/competitions/PL');
            renderMain();
        } catch (e) {
            localStorage.removeItem('fdo_token');
            state.token = '';
            $('#setupError').innerHTML = `<div class="error-msg">${errorText(e)}</div>`;
        }
    }

    // ==================== MAIN ====================
    function renderMain() {
        $('#app').innerHTML = `
        <div class="container">
            <div class="header">
                <h1>Футбольные Прогнозы</h1>
                <div class="header-right">
                    <button class="reset-key" onclick="resetKey()">Сменить ключ</button>
                </div>
            </div>
            <div class="leagues" id="leagueTabs"></div>
            <div id="matchList"></div>
        </div>
        <div id="modalContainer"></div>`;
        renderLeagues();
        selectLeague(LEAGUES[0].code);
    }

    function renderLeagues() {
        $('#leagueTabs').innerHTML = LEAGUES.map(l =>
            `<button class="league-btn" data-code="${l.code}" onclick="selectLeague('${l.code}')">${l.flag} ${l.name}</button>`
        ).join('');
    }

    function resetKey() {
        localStorage.removeItem('fdo_token');
        state.token = '';
        sessionStorage.clear();
        renderSetup();
    }

    // ==================== FIXTURES ====================
    async function selectLeague(code) {
        state.currentLeague = code;
        document.querySelectorAll('.league-btn').forEach(b => {
            b.classList.toggle('active', b.dataset.code === code);
        });
        $('#matchList').innerHTML = '<div class="loading"><div class="spinner"></div><br>Загрузка матчей...</div>';
        try {
            const data = await apiCall(`/competitions/${code}/matches?status=SCHEDULED`);
            const matches = (data.matches || []).slice(0, 15);
            renderFixtures(matches);
        } catch (e) {
            if (e.message === 'AUTH') { renderSetup(); return; }
            $('#matchList').innerHTML = `<div class="error-msg">${errorText(e)}</div>`;
        }
    }

    function renderFixtures(matches) {
        if (!matches.length) {
            $('#matchList').innerHTML = '<div class="empty-msg">Нет предстоящих матчей в этой лиге.<br>Попробуйте другую лигу.</div>';
            return;
        }
        $('#matchList').innerHTML = '<div class="matches">' + matches.map(m => {
            const home = m.homeTeam;
            const away = m.awayTeam;
            return `
            <div class="match-card" onclick="openPrediction(${m.id}, '${state.currentLeague}')">
                <div class="match-date">${formatDate(m.utcDate)}<br><b>${formatTime(m.utcDate)}</b></div>
                <div class="match-teams">
                    <div class="match-team">
                        <img src="${home.crest || ''}" alt="" onerror="this.style.display='none'">
                        <span>${home.shortName || home.name}</span>
                    </div>
                    <div class="match-team">
                        <img src="${away.crest || ''}" alt="" onerror="this.style.display='none'">
                        <span>${away.shortName || away.name}</span>
                    </div>
                </div>
                <button class="btn btn-green btn-sm">Прогноз</button>
            </div>`;
        }).join('') + '</div>';
    }

    // ==================== STANDINGS ====================
    async function getStandings(code) {
        if (state.standingsCache[code]) return state.standingsCache[code];
        try {
            const data = await apiCall(`/competitions/${code}/standings`);
            const result = { total: {}, home: {}, away: {} };
            (data.standings || []).forEach(s => {
                const type = s.type.toLowerCase();
                if (result[type]) {
                    (s.table || []).forEach(row => {
                        result[type][row.team.id] = row;
                    });
                }
            });
            state.standingsCache[code] = result;
            return result;
        } catch {
            return null;
        }
    }

    // ==================== PREDICTION ====================
    async function openPrediction(matchId, leagueCode) {
        $('#modalContainer').innerHTML = `
        <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
            <div class="modal">
                <div class="modal-header">
                    <h2>Расчёт прогноза...</h2>
                    <button class="modal-close" onclick="closeModal()">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="loading"><div class="spinner"></div><br>Загружаю статистику...</div>
                </div>
            </div>
        </div>`;

        try {
            // Load match details, standings, and H2H in parallel
            const [matchData, standings, h2hData] = await Promise.all([
                apiCall(`/matches/${matchId}`),
                getStandings(leagueCode),
                apiCall(`/matches/${matchId}/head2head?limit=5`).catch(() => null),
            ]);

            renderPrediction(matchData, standings, h2hData);
        } catch (e) {
            if (e.message === 'AUTH') { closeModal(); renderSetup(); return; }
            const body = document.querySelector('.modal-body');
            if (body) body.innerHTML = `<div class="error-msg">${errorText(e)}</div>`;
        }
    }

    function renderPrediction(match, standings, h2h) {
        const home = match.homeTeam;
        const away = match.awayTeam;

        // Get team stats from standings
        let homeAvgFor = 1.3, homeAvgAgainst = 1.0;
        let awayAvgFor = 1.1, awayAvgAgainst = 1.2;
        let homeForm = '', awayForm = '';
        let homeTotal = null, awayTotal = null;

        if (standings) {
            const hHome = standings.home?.[home.id];
            const aAway = standings.away?.[away.id];
            const hTotal = standings.total?.[home.id];
            const aTotal = standings.total?.[away.id];

            homeTotal = hTotal;
            awayTotal = aTotal;

            if (hHome && hHome.playedGames > 0) {
                homeAvgFor = hHome.goalsFor / hHome.playedGames;
                homeAvgAgainst = hHome.goalsAgainst / hHome.playedGames;
            } else if (hTotal && hTotal.playedGames > 0) {
                homeAvgFor = hTotal.goalsFor / hTotal.playedGames;
                homeAvgAgainst = hTotal.goalsAgainst / hTotal.playedGames;
            }

            if (aAway && aAway.playedGames > 0) {
                awayAvgFor = aAway.goalsFor / aAway.playedGames;
                awayAvgAgainst = aAway.goalsAgainst / aAway.playedGames;
            } else if (aTotal && aTotal.playedGames > 0) {
                awayAvgFor = aTotal.goalsFor / aTotal.playedGames;
                awayAvgAgainst = aTotal.goalsAgainst / aTotal.playedGames;
            }

            if (hTotal) homeForm = hTotal.form || '';
            if (aTotal) awayForm = aTotal.form || '';
        }

        // Expected goals (Poisson model)
        const homeXG = (homeAvgFor + awayAvgAgainst) / 2;
        const awayXG = (awayAvgFor + homeAvgAgainst) / 2;
        const totalXG = homeXG + awayXG;

        const pOver15 = probOver(homeXG, awayXG, 1);
        const pOver25 = probOver(homeXG, awayXG, 2);
        const pOver35 = probOver(homeXG, awayXG, 3);
        const pBtts = probBTTS(homeXG, awayXG);

        // BTTS from real data (failed to score proxy)
        let bttsFinal = pBtts;
        if (homeTotal && awayTotal && homeTotal.playedGames > 0 && awayTotal.playedGames > 0) {
            const hScoredPct = (homeTotal.playedGames - (homeTotal.lost + homeTotal.draw > homeTotal.playedGames ? 0 : 0)) > 0 ?
                1 - ((homeTotal.playedGames - homeTotal.won - homeTotal.draw) > 0 ? 0.1 : 0) : 0.7;
            // Better approximation using goals
            const hScoreRate = homeTotal.goalsFor > 0 ? Math.min(homeTotal.goalsFor / homeTotal.playedGames / 2 + 0.5, 0.95) : 0.5;
            const aScoreRate = awayTotal.goalsFor > 0 ? Math.min(awayTotal.goalsFor / awayTotal.playedGames / 2 + 0.5, 0.95) : 0.5;
            const bttsReal = hScoreRate * aScoreRate;
            bttsFinal = (pBtts + bttsReal) / 2;
        }

        // Estimated shots (from goals data)
        const homeShots = Math.round(homeAvgFor / 0.11);
        const awayShots = Math.round(awayAvgFor / 0.11);
        const homeOnTarget = Math.round(homeAvgFor / 0.33);
        const awayOnTarget = Math.round(awayAvgFor / 0.33);

        // Form display
        const formHtml = (form, teamName) => {
            if (!form) return `<span style="color:var(--text2)">Нет данных</span>`;
            const items = form.split(',').slice(-5);
            return items.map(c => `<div class="form-item form-${c}">${c === 'W' ? 'В' : c === 'D' ? 'Н' : 'П'}</div>`).join('');
        };

        // H2H
        let h2hHTML = '';
        if (h2h && h2h.matches && h2h.matches.length > 0) {
            h2hHTML = `
            <div class="pred-section">
                <div class="pred-section-title">Личные встречи</div>
                ${h2h.aggregates ? `<div class="info-msg">
                    Всего встреч: ${h2h.aggregates.numberOfMatches || '?'} |
                    Голов: ${h2h.aggregates.totalGoals || '?'} |
                    Побед ${home.shortName || home.name}: ${h2h.aggregates.homeTeam?.wins || 0} |
                    Побед ${away.shortName || away.name}: ${h2h.aggregates.awayTeam?.wins || 0}
                </div>` : ''}
                ${h2h.matches.slice(0, 5).map(m => `
                    <div class="h2h-match">
                        <div class="h2h-date">${formatDate(m.utcDate)}</div>
                        <div class="h2h-teams">${m.homeTeam?.shortName || m.homeTeam?.name || '?'}</div>
                        <div class="h2h-score">${m.score?.fullTime?.home ?? '?'} : ${m.score?.fullTime?.away ?? '?'}</div>
                        <div class="h2h-teams" style="text-align:right">${m.awayTeam?.shortName || m.awayTeam?.name || '?'}</div>
                    </div>
                `).join('')}
            </div>`;
        }

        // Season stats table
        let statsHTML = '';
        if (homeTotal && awayTotal) {
            statsHTML = `
            <div class="pred-section">
                <div class="pred-section-title">Статистика за сезон</div>
                <table class="shots-table">
                    <tr><th></th><th>${home.shortName || home.name}</th><th>${away.shortName || away.name}</th></tr>
                    <tr><td style="color:var(--text2)">Матчи</td><td>${homeTotal.playedGames}</td><td>${awayTotal.playedGames}</td></tr>
                    <tr><td style="color:var(--text2)">Победы</td><td>${homeTotal.won}</td><td>${awayTotal.won}</td></tr>
                    <tr><td style="color:var(--text2)">Ничьи</td><td>${homeTotal.draw}</td><td>${awayTotal.draw}</td></tr>
                    <tr><td style="color:var(--text2)">Поражения</td><td>${homeTotal.lost}</td><td>${awayTotal.lost}</td></tr>
                    <tr><td style="color:var(--text2)">Забито</td><td>${homeTotal.goalsFor}</td><td>${awayTotal.goalsFor}</td></tr>
                    <tr><td style="color:var(--text2)">Пропущено</td><td>${homeTotal.goalsAgainst}</td><td>${awayTotal.goalsAgainst}</td></tr>
                    <tr><td style="color:var(--text2)">Разница</td><td>${homeTotal.goalDifference > 0 ? '+' : ''}${homeTotal.goalDifference}</td><td>${awayTotal.goalDifference > 0 ? '+' : ''}${awayTotal.goalDifference}</td></tr>
                    <tr><td style="color:var(--text2)">Очки</td><td><b>${homeTotal.points}</b></td><td><b>${awayTotal.points}</b></td></tr>
                </table>
            </div>`;
        }

        // Render
        document.querySelector('.modal-header h2').textContent = `${home.shortName || home.name} — ${away.shortName || away.name}`;
        document.querySelector('.modal-body').innerHTML = `
            <div class="pred-teams">
                <div class="pred-team">
                    <img src="${home.crest || ''}" alt="" onerror="this.style.display='none'">
                    <div class="pred-team-name">${home.shortName || home.name}</div>
                </div>
                <div class="pred-vs">VS</div>
                <div class="pred-team">
                    <img src="${away.crest || ''}" alt="" onerror="this.style.display='none'">
                    <div class="pred-team-name">${away.shortName || away.name}</div>
                </div>
            </div>

            <div class="pred-section">
                <div class="pred-section-title">Тотал голов</div>
                <div class="pred-row">
                    <span class="pred-label">Ожидаемый тотал</span>
                    <span class="pred-value" style="font-size:20px">${totalXG.toFixed(2)}</span>
                </div>
                <div class="pred-row">
                    <span class="pred-label">Голы ${home.shortName || home.name} (дома)</span>
                    <span class="pred-value">${homeXG.toFixed(2)}</span>
                </div>
                <div class="pred-row">
                    <span class="pred-label">Голы ${away.shortName || away.name} (гости)</span>
                    <span class="pred-value">${awayXG.toFixed(2)}</span>
                </div>
                <div style="margin-top:12px">
                    ${renderProbBar('ТБ 1.5', pOver15)}
                    ${renderProbBar('ТБ 2.5', pOver25)}
                    ${renderProbBar('ТБ 3.5', pOver35)}
                </div>
            </div>

            <div class="pred-section">
                <div class="pred-section-title">Обе забьют (BTTS)</div>
                ${renderProbBar('Обе забьют — ДА', bttsFinal)}
                ${renderProbBar('Обе забьют — НЕТ', 1 - bttsFinal)}
            </div>

            <div class="pred-section">
                <div class="pred-section-title">Удары и штанги (оценка за матч)</div>
                <p style="font-size:12px;color:var(--text2);margin-bottom:8px">
                    Оценка на основе результативности. «Мимо/штанги» включает штанги, перекладины и промахи.
                </p>
                <table class="shots-table">
                    <tr><th>Команда</th><th>~Ударов</th><th>~В створ</th><th>~Мимо/штанги</th></tr>
                    <tr>
                        <td>${home.shortName || home.name}</td>
                        <td>${homeShots}</td>
                        <td>${homeOnTarget}</td>
                        <td>${homeShots - homeOnTarget}</td>
                    </tr>
                    <tr>
                        <td>${away.shortName || away.name}</td>
                        <td>${awayShots}</td>
                        <td>${awayOnTarget}</td>
                        <td>${awayShots - awayOnTarget}</td>
                    </tr>
                </table>
            </div>

            <div class="pred-section">
                <div class="pred-section-title">Форма (последние матчи)</div>
                <div class="pred-row">
                    <span class="pred-label">${home.shortName || home.name}</span>
                    <div class="form-row">${formHtml(homeForm)}</div>
                </div>
                <div class="pred-row" style="margin-top:8px">
                    <span class="pred-label">${away.shortName || away.name}</span>
                    <div class="form-row">${formHtml(awayForm)}</div>
                </div>
                <p style="font-size:11px;color:var(--text2);margin-top:8px">В — победа, Н — ничья, П — поражение</p>
            </div>

            ${statsHTML}
            ${h2hHTML}

            <p style="font-size:11px;color:var(--text2);text-align:center;margin-top:16px">
                Прогнозы рассчитаны на основе модели Пуассона и сезонной статистики. Это математическая оценка, а не гарантия.
            </p>
        `;
    }

    function renderProbBar(label, prob) {
        const p = Math.round(prob * 100);
        const cls = probColor(prob);
        const color = barColor(prob);
        return `
        <div class="prob-bar">
            <span class="pred-label" style="min-width:140px">${label}</span>
            <div class="prob-bar-track">
                <div class="prob-bar-fill" style="width:${p}%;background:${color}"></div>
            </div>
            <span class="prob-bar-label ${cls}">${p}%</span>
        </div>`;
    }

    function closeModal() { $('#modalContainer').innerHTML = ''; }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // ==================== INIT ====================
    // Try without token first
    async function init() {
        if (state.token) {
            try {
                await apiCall('/competitions/PL');
                renderMain();
                return;
            } catch (e) {
                if (e.message === 'AUTH') {
                    localStorage.removeItem('fdo_token');
                    state.token = '';
                }
            }
        }
        // Try without token
        try {
            await apiCall('/competitions/PL');
            renderMain();
        } catch {
            renderSetup();
        }
    }

    init();
    </script>
</body>
</html>
