<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Футбольные Прогнозы</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0d1117; --bg2: #161b22; --card: #1c2333; --hover: #242d3d;
            --green: #00e676; --red: #ff5252; --yellow: #ffd740; --blue: #448aff;
            --text: #e6edf3; --text2: #8b949e; --border: #30363d; --radius: 12px;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; padding: 16px; }
        h1 { font-size: 24px; margin-bottom: 8px; }
        h2 { font-size: 18px; margin-bottom: 12px; color: var(--text2); }

        /* Setup */
        .setup { max-width: 600px; margin: 60px auto; padding: 32px; background: var(--bg2); border-radius: var(--radius); border: 1px solid var(--border); }
        .setup h1 { text-align: center; margin-bottom: 24px; font-size: 28px; }
        .step { display: flex; gap: 12px; margin-bottom: 20px; padding: 16px; background: var(--card); border-radius: 8px; }
        .step-num { width: 32px; height: 32px; border-radius: 50%; background: var(--blue); display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; font-size: 14px; }
        .step-text { font-size: 14px; line-height: 1.5; }
        .step-text a { color: var(--blue); text-decoration: none; }
        .step-text a:hover { text-decoration: underline; }
        .step-text code { background: var(--bg); padding: 2px 6px; border-radius: 4px; font-size: 13px; }
        .key-input { display: flex; gap: 8px; margin-top: 24px; }
        .key-input input { flex: 1; padding: 12px 16px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 15px; outline: none; }
        .key-input input:focus { border-color: var(--blue); }
        .key-input input::placeholder { color: var(--text2); }

        /* Buttons */
        .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: var(--blue); color: #fff; }
        .btn-primary:hover { background: #5c9aff; }
        .btn-green { background: var(--green); color: #000; }
        .btn-green:hover { background: #33eb91; }
        .btn-sm { padding: 6px 14px; font-size: 13px; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Header */
        .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; flex-wrap: wrap; gap: 8px; }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header-right { font-size: 12px; color: var(--text2); }
        .reset-key { color: var(--text2); cursor: pointer; font-size: 12px; text-decoration: underline; background: none; border: none; }

        /* Leagues */
        .leagues { display: flex; gap: 6px; overflow-x: auto; padding: 8px 0 16px; -webkit-overflow-scrolling: touch; }
        .leagues::-webkit-scrollbar { height: 4px; }
        .leagues::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        .league-btn { padding: 8px 16px; background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; color: var(--text2); cursor: pointer; white-space: nowrap; font-size: 13px; transition: all 0.2s; }
        .league-btn:hover { background: var(--card); color: var(--text); }
        .league-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }

        /* Matches */
        .matches { display: flex; flex-direction: column; gap: 8px; }
        .match-card { display: flex; align-items: center; gap: 12px; padding: 16px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; transition: all 0.2s; }
        .match-card:hover { background: var(--card); border-color: var(--blue); }
        .match-date { font-size: 12px; color: var(--text2); min-width: 50px; text-align: center; line-height: 1.3; }
        .match-teams { flex: 1; display: flex; flex-direction: column; gap: 6px; }
        .match-team { display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .match-team img { width: 24px; height: 24px; object-fit: contain; }
        .match-vs { color: var(--text2); font-size: 12px; font-weight: 700; text-align: center; min-width: 30px; }
        .match-score { font-size: 18px; font-weight: 700; min-width: 50px; text-align: center; }
        .match-predict-btn { padding: 8px 16px; }

        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: flex-start; justify-content: center; overflow-y: auto; padding: 20px; }
        .modal { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); width: 100%; max-width: 700px; margin: 20px auto; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border-bottom: 1px solid var(--border); }
        .modal-header h2 { font-size: 16px; color: var(--text); margin: 0; }
        .modal-close { background: none; border: none; color: var(--text2); font-size: 24px; cursor: pointer; padding: 4px 8px; }
        .modal-close:hover { color: var(--text); }
        .modal-body { padding: 24px; }

        /* Prediction sections */
        .pred-teams { display: flex; align-items: center; justify-content: center; gap: 24px; padding: 20px; margin-bottom: 20px; background: var(--bg2); border-radius: var(--radius); }
        .pred-team { text-align: center; }
        .pred-team img { width: 56px; height: 56px; object-fit: contain; margin-bottom: 8px; }
        .pred-team-name { font-size: 14px; font-weight: 600; }
        .pred-vs { font-size: 20px; font-weight: 700; color: var(--text2); }

        .pred-section { margin-bottom: 20px; }
        .pred-section-title { font-size: 14px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }

        .pred-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; }
        .pred-label { font-size: 14px; color: var(--text2); }
        .pred-value { font-size: 14px; font-weight: 600; }

        .prob-bar { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
        .prob-bar-track { flex: 1; height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; }
        .prob-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
        .prob-bar-label { font-size: 13px; min-width: 45px; text-align: right; font-weight: 600; }
        .prob-high { color: var(--green); }
        .prob-mid { color: var(--yellow); }
        .prob-low { color: var(--red); }

        .form-row { display: flex; gap: 4px; }
        .form-item { width: 28px; height: 28px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
        .form-W { background: #1b5e20; color: var(--green); }
        .form-D { background: #4e342e; color: var(--yellow); }
        .form-L { background: #b71c1c; color: var(--red); }

        .h2h-match { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
        .h2h-match:last-child { border-bottom: none; }
        .h2h-score { font-weight: 700; min-width: 40px; text-align: center; }
        .h2h-date { color: var(--text2); min-width: 80px; }
        .h2h-teams { flex: 1; }

        .advice-box { padding: 16px; background: var(--bg2); border-radius: 8px; border-left: 4px solid var(--blue); font-size: 14px; line-height: 1.5; }

        /* Shots table */
        .shots-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .shots-table th { text-align: left; padding: 8px; color: var(--text2); font-weight: 600; border-bottom: 1px solid var(--border); }
        .shots-table td { padding: 8px; border-bottom: 1px solid var(--border); }
        .shots-table tr:last-child td { border-bottom: none; }

        /* Loading */
        .loading { text-align: center; padding: 40px; color: var(--text2); }
        .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Error */
        .error-msg { padding: 16px; background: #2d1515; border: 1px solid var(--red); border-radius: 8px; color: var(--red); font-size: 14px; margin: 12px 0; }
        .empty-msg { text-align: center; padding: 40px; color: var(--text2); font-size: 14px; }

        /* Responsive */
        @media (max-width: 600px) {
            .container { padding: 8px; }
            .setup { margin: 20px 8px; padding: 20px; }
            .match-card { flex-wrap: wrap; }
            .pred-teams { gap: 12px; }
            .pred-team img { width: 40px; height: 40px; }
            .modal { margin: 8px; }
            .modal-body { padding: 16px; }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
    // ==================== CONFIG ====================
    const API_BASE = 'https://v3.football.api-sports.io';
    const SEASON = 2025;
    const LEAGUES = [
        { id: 235, name: 'РПЛ', flag: '\u{1F1F7}\u{1F1FA}' },
        { id: 39,  name: 'АПЛ', flag: '\u{1F1EC}\u{1F1E7}' },
        { id: 140, name: 'Ла Лига', flag: '\u{1F1EA}\u{1F1F8}' },
        { id: 135, name: 'Серия А', flag: '\u{1F1EE}\u{1F1F9}' },
        { id: 78,  name: 'Бундеслига', flag: '\u{1F1E9}\u{1F1EA}' },
        { id: 61,  name: 'Лига 1', flag: '\u{1F1EB}\u{1F1F7}' },
        { id: 2,   name: 'Лига Чемпионов', flag: '\u2B50' },
    ];

    // ==================== STATE ====================
    const state = {
        apiKey: localStorage.getItem('football_api_key') || '',
        currentLeague: null,
        requestsLeft: null,
    };

    // ==================== CACHE ====================
    const cache = {
        get(key) {
            try {
                const raw = sessionStorage.getItem('fc_' + key);
                if (!raw) return null;
                const { data, exp } = JSON.parse(raw);
                if (Date.now() > exp) { sessionStorage.removeItem('fc_' + key); return null; }
                return data;
            } catch { return null; }
        },
        set(key, data, ttl) {
            try { sessionStorage.setItem('fc_' + key, JSON.stringify({ data, exp: Date.now() + ttl })); } catch {}
        }
    };

    // ==================== API ====================
    async function apiCall(endpoint) {
        const cached = cache.get(endpoint);
        if (cached) return cached;

        const res = await fetch(API_BASE + endpoint, {
            headers: { 'x-apisports-key': state.apiKey }
        });

        const remaining = res.headers.get('x-ratelimit-requests-remaining');
        if (remaining !== null) state.requestsLeft = parseInt(remaining);

        if (res.status === 401 || res.status === 403) throw new Error('AUTH');
        if (res.status === 429) throw new Error('RATE_LIMIT');
        if (!res.ok) throw new Error('HTTP_' + res.status);

        const json = await res.json();
        if (json.errors && Object.keys(json.errors).length > 0) {
            const msg = Object.values(json.errors).join(', ');
            if (msg.toLowerCase().includes('token') || msg.toLowerCase().includes('key')) throw new Error('AUTH');
            throw new Error(msg);
        }

        cache.set(endpoint, json, 30 * 60 * 1000);
        return json;
    }

    // ==================== MATH ====================
    function factorial(n) {
        let r = 1;
        for (let i = 2; i <= n; i++) r *= i;
        return r;
    }

    function poisson(lambda, k) {
        if (lambda <= 0) return k === 0 ? 1 : 0;
        return Math.pow(lambda, k) * Math.exp(-lambda) / factorial(k);
    }

    function probOver(homeXG, awayXG, threshold) {
        let under = 0;
        for (let t = 0; t <= threshold; t++) {
            for (let h = 0; h <= t; h++) {
                under += poisson(homeXG, h) * poisson(awayXG, t - h);
            }
        }
        return Math.min(Math.max(1 - under, 0), 1);
    }

    function probBTTS(homeXG, awayXG) {
        return (1 - poisson(homeXG, 0)) * (1 - poisson(awayXG, 0));
    }

    function probColor(p) {
        if (p >= 0.65) return 'prob-high';
        if (p >= 0.40) return 'prob-mid';
        return 'prob-low';
    }

    function barColor(p) {
        if (p >= 0.65) return 'var(--green)';
        if (p >= 0.40) return 'var(--yellow)';
        return 'var(--red)';
    }

    // ==================== HELPERS ====================
    function $(sel) { return document.querySelector(sel); }
    function formatDate(dateStr) {
        const d = new Date(dateStr);
        return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
    }
    function formatTime(dateStr) {
        const d = new Date(dateStr);
        return d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    }
    function pct(val) { return Math.round(val * 100) + '%'; }

    function errorText(err) {
        if (err.message === 'AUTH') return 'Неверный API-ключ. Проверьте и введите заново.';
        if (err.message === 'RATE_LIMIT') return 'Лимит запросов исчерпан (100/день). Попробуйте завтра.';
        if (err.message === 'Failed to fetch') return 'Ошибка сети. Проверьте интернет. Если файл открыт с диска — попробуйте через локальный сервер (см. инструкцию в настройках).';
        return 'Ошибка: ' + err.message;
    }

    // ==================== RENDER: SETUP ====================
    function renderSetup() {
        $('#app').innerHTML = `
        <div class="setup">
            <h1>Футбольные Прогнозы</h1>
            <p style="text-align:center;color:var(--text2);margin-bottom:24px">
                Для работы нужен бесплатный API-ключ. Следуйте инструкции:
            </p>
            <div class="step">
                <div class="step-num">1</div>
                <div class="step-text">
                    Откройте сайт <a href="https://dashboard.api-football.com/register" target="_blank">dashboard.api-football.com/register</a>
                    и зарегистрируйтесь (имя, email, пароль).
                </div>
            </div>
            <div class="step">
                <div class="step-num">2</div>
                <div class="step-text">
                    Подтвердите email — перейдите по ссылке в письме.
                </div>
            </div>
            <div class="step">
                <div class="step-num">3</div>
                <div class="step-text">
                    Войдите в <a href="https://dashboard.api-football.com/profile" target="_blank">личный кабинет</a>
                    и найдите раздел <b>«My Access»</b> или <b>«API-KEY»</b> — там будет ваш ключ.
                </div>
            </div>
            <div class="step">
                <div class="step-num">4</div>
                <div class="step-text">
                    Скопируйте ключ и вставьте его в поле ниже. Это нужно сделать <b>один раз</b> — ключ сохранится в браузере.
                </div>
            </div>
            <div class="key-input">
                <input id="apiKeyInput" type="text" placeholder="Вставьте API-ключ сюда..." value="${state.apiKey}">
                <button class="btn btn-primary" onclick="saveKey()">Сохранить</button>
            </div>
            <div id="setupError"></div>
            <p style="margin-top:16px;font-size:12px;color:var(--text2);text-align:center">
                Бесплатный план: 100 запросов в день. Этого хватит на ~30 прогнозов.
            </p>
        </div>`;
        setTimeout(() => { const inp = $('#apiKeyInput'); if (inp) inp.focus(); }, 100);
    }

    async function saveKey() {
        const key = $('#apiKeyInput').value.trim();
        if (!key) return;
        state.apiKey = key;
        localStorage.setItem('football_api_key', key);
        $('#setupError').innerHTML = '<div class="loading"><div class="spinner"></div><br>Проверяю ключ...</div>';
        try {
            await apiCall('/status');
            renderMain();
        } catch (e) {
            localStorage.removeItem('football_api_key');
            state.apiKey = '';
            $('#setupError').innerHTML = `<div class="error-msg">${errorText(e)}</div>`;
        }
    }

    // ==================== RENDER: MAIN ====================
    function renderMain() {
        $('#app').innerHTML = `
        <div class="container">
            <div class="header">
                <div class="header-left">
                    <h1>Футбольные Прогнозы</h1>
                </div>
                <div class="header-right">
                    <span id="rateLimit"></span>
                    <button class="reset-key" onclick="resetKey()">Сменить API-ключ</button>
                </div>
            </div>
            <div class="leagues" id="leagueTabs"></div>
            <div id="matchList"></div>
        </div>
        <div id="modalContainer"></div>`;
        renderLeagues();
        updateRate();
        // Auto-select first league
        selectLeague(LEAGUES[0].id);
    }

    function renderLeagues() {
        $('#leagueTabs').innerHTML = LEAGUES.map(l =>
            `<button class="league-btn" data-id="${l.id}" onclick="selectLeague(${l.id})">${l.flag} ${l.name}</button>`
        ).join('');
    }

    function updateRate() {
        const el = $('#rateLimit');
        if (el && state.requestsLeft !== null) {
            el.textContent = `Запросов: ${state.requestsLeft}/100`;
        }
    }

    function resetKey() {
        localStorage.removeItem('football_api_key');
        state.apiKey = '';
        sessionStorage.clear();
        renderSetup();
    }

    // ==================== FIXTURES ====================
    async function selectLeague(leagueId) {
        state.currentLeague = leagueId;
        document.querySelectorAll('.league-btn').forEach(b => {
            b.classList.toggle('active', parseInt(b.dataset.id) === leagueId);
        });
        $('#matchList').innerHTML = '<div class="loading"><div class="spinner"></div><br>Загрузка матчей...</div>';
        try {
            const data = await apiCall(`/fixtures?league=${leagueId}&season=${SEASON}&next=15`);
            updateRate();
            renderFixtures(data.response || []);
        } catch (e) {
            if (e.message === 'AUTH') { resetKey(); return; }
            $('#matchList').innerHTML = `<div class="error-msg">${errorText(e)}</div>`;
        }
    }

    function renderFixtures(fixtures) {
        if (!fixtures.length) {
            $('#matchList').innerHTML = '<div class="empty-msg">Нет предстоящих матчей в этой лиге.<br>Попробуйте другую лигу.</div>';
            return;
        }
        $('#matchList').innerHTML = '<div class="matches">' + fixtures.map(f => {
            const home = f.teams.home;
            const away = f.teams.away;
            const date = formatDate(f.fixture.date);
            const time = formatTime(f.fixture.date);
            return `
            <div class="match-card" onclick="openPrediction(${f.fixture.id}, ${home.id}, ${away.id}, ${state.currentLeague})">
                <div class="match-date">${date}<br><b>${time}</b></div>
                <div class="match-teams">
                    <div class="match-team">
                        <img src="${home.logo}" alt="" onerror="this.style.display='none'">
                        <span>${home.name}</span>
                    </div>
                    <div class="match-team">
                        <img src="${away.logo}" alt="" onerror="this.style.display='none'">
                        <span>${away.name}</span>
                    </div>
                </div>
                <button class="btn btn-green btn-sm match-predict-btn">Прогноз</button>
            </div>`;
        }).join('') + '</div>';
    }

    // ==================== PREDICTION ====================
    async function openPrediction(fixtureId, homeId, awayId, leagueId) {
        // Show modal with loading
        $('#modalContainer').innerHTML = `
        <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
            <div class="modal">
                <div class="modal-header">
                    <h2>Расчёт прогноза...</h2>
                    <button class="modal-close" onclick="closeModal()">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="loading"><div class="spinner"></div><br>Загружаю статистику и считаю прогноз...</div>
                </div>
            </div>
        </div>`;

        try {
            // Main prediction call — includes team stats, H2H, comparison
            const predData = await apiCall(`/predictions?fixture=${fixtureId}`);
            updateRate();

            if (!predData.response || !predData.response.length) {
                throw new Error('Нет данных для прогноза этого матча');
            }

            const pred = predData.response[0];

            // Try to load shooting stats from recent H2H fixtures
            let h2hShots = [];
            if (pred.h2h && pred.h2h.length > 0) {
                const h2hIds = pred.h2h.slice(0, 3).map(m => m.fixture.id);
                const shotPromises = h2hIds.map(async (fid) => {
                    try {
                        const s = await apiCall(`/fixtures/statistics?fixture=${fid}`);
                        updateRate();
                        return { fixtureId: fid, stats: s.response || [] };
                    } catch { return null; }
                });
                h2hShots = (await Promise.all(shotPromises)).filter(Boolean);
            }

            renderPrediction(pred, h2hShots);
        } catch (e) {
            if (e.message === 'AUTH') { closeModal(); resetKey(); return; }
            const modal = document.querySelector('.modal-body');
            if (modal) modal.innerHTML = `<div class="error-msg">${errorText(e)}</div>`;
        }
    }

    function renderPrediction(pred, h2hShots) {
        const home = pred.teams.home;
        const away = pred.teams.away;
        const homeStats = home.league || {};
        const awayStats = away.league || {};

        // Calculate expected goals
        const homeAvgFor = parseFloat(homeStats.goals?.for?.average?.home || homeStats.goals?.for?.average?.total || '1.2');
        const homeAvgAgainst = parseFloat(homeStats.goals?.against?.average?.home || homeStats.goals?.against?.average?.total || '1.0');
        const awayAvgFor = parseFloat(awayStats.goals?.for?.average?.away || awayStats.goals?.for?.average?.total || '1.0');
        const awayAvgAgainst = parseFloat(awayStats.goals?.against?.average?.away || awayStats.goals?.against?.average?.total || '1.2');

        const homeXG = (homeAvgFor + awayAvgAgainst) / 2;
        const awayXG = (awayAvgFor + homeAvgAgainst) / 2;
        const totalXG = homeXG + awayXG;

        // Poisson probabilities
        const pOver15 = probOver(homeXG, awayXG, 1);
        const pOver25 = probOver(homeXG, awayXG, 2);
        const pOver35 = probOver(homeXG, awayXG, 3);
        const pBtts = probBTTS(homeXG, awayXG);

        // BTTS from actual data
        const homePlayedHome = homeStats.fixtures?.played?.home || 1;
        const awayPlayedAway = awayStats.fixtures?.played?.away || 1;
        const homeFailedHome = homeStats.failed_to_score?.home || 0;
        const awayFailedAway = awayStats.failed_to_score?.away || 0;
        const homeScoredPct = 1 - (homeFailedHome / homePlayedHome);
        const awayScoredPct = 1 - (awayFailedAway / awayPlayedAway);
        const bttsReal = homeScoredPct * awayScoredPct;
        const bttsFinal = (pBtts + bttsReal) / 2; // average of Poisson and real data

        // Form
        const homeForm = homeStats.form || '';
        const awayForm = awayStats.form || '';

        // Build H2H shooting table
        let shotsHTML = '';
        if (h2hShots.length > 0) {
            let rows = '';
            h2hShots.forEach(match => {
                if (!match.stats || match.stats.length < 2) return;
                const t1 = match.stats[0];
                const t2 = match.stats[1];
                const getStat = (teamStats, name) => {
                    const s = teamStats.statistics?.find(s => s.type === name);
                    return s ? (s.value || 0) : '-';
                };
                rows += `<tr>
                    <td>${t1.team?.name || '?'}</td>
                    <td>${getStat(t1, 'Total Shots')}</td>
                    <td>${getStat(t1, 'Shots on Goal')}</td>
                    <td>${getStat(t1, 'Shots off Goal')}</td>
                </tr>
                <tr>
                    <td>${t2.team?.name || '?'}</td>
                    <td>${getStat(t2, 'Total Shots')}</td>
                    <td>${getStat(t2, 'Shots on Goal')}</td>
                    <td>${getStat(t2, 'Shots off Goal')}</td>
                </tr>
                <tr><td colspan="4" style="height:4px;background:var(--border);padding:0"></td></tr>`;
            });
            if (rows) {
                shotsHTML = `
                <div class="pred-section">
                    <div class="pred-section-title">Удары по воротам (прошлые встречи)</div>
                    <p style="font-size:12px;color:var(--text2);margin-bottom:8px">
                        «Мимо» включает штанги, перекладины и промахи
                    </p>
                    <table class="shots-table">
                        <tr><th>Команда</th><th>Всего</th><th>В створ</th><th>Мимо</th></tr>
                        ${rows}
                    </table>
                </div>`;
            }
        }
        if (!shotsHTML) {
            // Fallback: estimated from goals data
            const homeShots = Math.round(homeAvgFor / 0.11);
            const awayShots = Math.round(awayAvgFor / 0.11);
            const homeOnTarget = Math.round(homeAvgFor / 0.33);
            const awayOnTarget = Math.round(awayAvgFor / 0.33);
            shotsHTML = `
            <div class="pred-section">
                <div class="pred-section-title">Удары и штанги (оценка)</div>
                <p style="font-size:12px;color:var(--text2);margin-bottom:8px">
                    Оценка на основе средней результативности. Включает потенциальные штанги/перекладины.
                </p>
                <table class="shots-table">
                    <tr><th>Команда</th><th>~Ударов</th><th>~В створ</th><th>~Мимо/штанги</th></tr>
                    <tr>
                        <td>${home.name}</td>
                        <td>${homeShots}</td>
                        <td>${homeOnTarget}</td>
                        <td>${homeShots - homeOnTarget}</td>
                    </tr>
                    <tr>
                        <td>${away.name}</td>
                        <td>${awayShots}</td>
                        <td>${awayOnTarget}</td>
                        <td>${awayShots - awayOnTarget}</td>
                    </tr>
                </table>
            </div>`;
        }

        // H2H matches
        let h2hHTML = '';
        if (pred.h2h && pred.h2h.length > 0) {
            h2hHTML = `
            <div class="pred-section">
                <div class="pred-section-title">Личные встречи</div>
                ${pred.h2h.slice(0, 5).map(m => `
                    <div class="h2h-match">
                        <div class="h2h-date">${formatDate(m.fixture.date)}</div>
                        <div class="h2h-teams">${m.teams.home.name}</div>
                        <div class="h2h-score">${m.goals.home ?? '?'} : ${m.goals.away ?? '?'}</div>
                        <div class="h2h-teams" style="text-align:right">${m.teams.away.name}</div>
                    </div>
                `).join('')}
            </div>`;
        }

        // Advice from API
        const advice = pred.predictions?.advice || '';
        const apiPct = pred.predictions?.percent || {};

        // Render modal
        document.querySelector('.modal-header h2').textContent = `${home.name} — ${away.name}`;
        document.querySelector('.modal-body').innerHTML = `
            <div class="pred-teams">
                <div class="pred-team">
                    <img src="${home.logo}" alt="" onerror="this.style.display='none'">
                    <div class="pred-team-name">${home.name}</div>
                </div>
                <div class="pred-vs">VS</div>
                <div class="pred-team">
                    <img src="${away.logo}" alt="" onerror="this.style.display='none'">
                    <div class="pred-team-name">${away.name}</div>
                </div>
            </div>

            <!-- ТОТАЛЫ -->
            <div class="pred-section">
                <div class="pred-section-title">Тотал голов</div>
                <div class="pred-row">
                    <span class="pred-label">Ожидаемый тотал матча</span>
                    <span class="pred-value" style="font-size:20px">${totalXG.toFixed(2)}</span>
                </div>
                <div class="pred-row"><span class="pred-label">Ожидаемые голы ${home.name} (дома)</span><span class="pred-value">${homeXG.toFixed(2)}</span></div>
                <div class="pred-row"><span class="pred-label">Ожидаемые голы ${away.name} (гости)</span><span class="pred-value">${awayXG.toFixed(2)}</span></div>
                <div style="margin-top:12px">
                    ${renderProbBar('ТБ 1.5', pOver15)}
                    ${renderProbBar('ТБ 2.5', pOver25)}
                    ${renderProbBar('ТБ 3.5', pOver35)}
                </div>
            </div>

            <!-- ОБЕ ЗАБЬЮТ -->
            <div class="pred-section">
                <div class="pred-section-title">Обе забьют (BTTS)</div>
                <div class="pred-row">
                    <span class="pred-label">${home.name} забивает дома</span>
                    <span class="pred-value ${probColor(homeScoredPct)}">${pct(homeScoredPct)} матчей</span>
                </div>
                <div class="pred-row">
                    <span class="pred-label">${away.name} забивает в гостях</span>
                    <span class="pred-value ${probColor(awayScoredPct)}">${pct(awayScoredPct)} матчей</span>
                </div>
                <div style="margin-top:8px">
                    ${renderProbBar('Обе забьют — ДА', bttsFinal)}
                    ${renderProbBar('Обе забьют — НЕТ', 1 - bttsFinal)}
                </div>
            </div>

            <!-- УДАРЫ -->
            ${shotsHTML}

            <!-- ФОРМА -->
            <div class="pred-section">
                <div class="pred-section-title">Форма (последние матчи)</div>
                <div class="pred-row">
                    <span class="pred-label">${home.name}</span>
                    <div class="form-row">
                        ${homeForm.split('').slice(-5).map(c => `<div class="form-item form-${c}">${c === 'W' ? 'В' : c === 'D' ? 'Н' : 'П'}</div>`).join('')}
                    </div>
                </div>
                <div class="pred-row" style="margin-top:8px">
                    <span class="pred-label">${away.name}</span>
                    <div class="form-row">
                        ${awayForm.split('').slice(-5).map(c => `<div class="form-item form-${c}">${c === 'W' ? 'В' : c === 'D' ? 'Н' : 'П'}</div>`).join('')}
                    </div>
                </div>
                <p style="font-size:11px;color:var(--text2);margin-top:8px">В — победа, Н — ничья, П — поражение</p>
            </div>

            <!-- ГОЛЫ -->
            <div class="pred-section">
                <div class="pred-section-title">Статистика голов за сезон</div>
                <table class="shots-table">
                    <tr><th></th><th>${home.name}</th><th>${away.name}</th></tr>
                    <tr>
                        <td style="color:var(--text2)">Забито (всего)</td>
                        <td>${homeStats.goals?.for?.total?.total || '?'}</td>
                        <td>${awayStats.goals?.for?.total?.total || '?'}</td>
                    </tr>
                    <tr>
                        <td style="color:var(--text2)">Пропущено (всего)</td>
                        <td>${homeStats.goals?.against?.total?.total || '?'}</td>
                        <td>${awayStats.goals?.against?.total?.total || '?'}</td>
                    </tr>
                    <tr>
                        <td style="color:var(--text2)">Средн. забито/матч</td>
                        <td>${homeStats.goals?.for?.average?.total || '?'}</td>
                        <td>${awayStats.goals?.for?.average?.total || '?'}</td>
                    </tr>
                    <tr>
                        <td style="color:var(--text2)">Средн. пропущено/матч</td>
                        <td>${homeStats.goals?.against?.average?.total || '?'}</td>
                        <td>${awayStats.goals?.against?.average?.total || '?'}</td>
                    </tr>
                    <tr>
                        <td style="color:var(--text2)">Сухие матчи</td>
                        <td>${homeStats.clean_sheet?.total || '?'}</td>
                        <td>${awayStats.clean_sheet?.total || '?'}</td>
                    </tr>
                    <tr>
                        <td style="color:var(--text2)">Не забивали</td>
                        <td>${homeStats.failed_to_score?.total || '?'}</td>
                        <td>${awayStats.failed_to_score?.total || '?'}</td>
                    </tr>
                </table>
            </div>

            <!-- H2H -->
            ${h2hHTML}

            <!-- API ADVICE -->
            ${advice ? `
            <div class="pred-section">
                <div class="pred-section-title">Рекомендация API</div>
                <div class="advice-box">
                    ${advice}
                    ${apiPct.home ? `<div style="margin-top:8px;font-size:13px;color:var(--text2)">
                        Победа хозяев: ${apiPct.home} | Ничья: ${apiPct.draw} | Победа гостей: ${apiPct.away}
                    </div>` : ''}
                </div>
            </div>` : ''}

            <p style="font-size:11px;color:var(--text2);text-align:center;margin-top:16px">
                Прогнозы рассчитаны на основе модели Пуассона и сезонной статистики команд. Это математическая оценка, а не гарантия результата.
            </p>
        `;
    }

    function renderProbBar(label, prob) {
        const p = Math.round(prob * 100);
        const cls = probColor(prob);
        const color = barColor(prob);
        return `
        <div class="prob-bar">
            <span class="pred-label" style="min-width:120px">${label}</span>
            <div class="prob-bar-track">
                <div class="prob-bar-fill" style="width:${p}%;background:${color}"></div>
            </div>
            <span class="prob-bar-label ${cls}">${p}%</span>
        </div>`;
    }

    function closeModal() {
        $('#modalContainer').innerHTML = '';
    }

    // Close modal on Escape
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // ==================== INIT ====================
    if (state.apiKey) {
        renderMain();
    } else {
        renderSetup();
    }
    </script>
</body>
</html>
