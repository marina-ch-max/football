        const bets = [];
        const now = new Date();
        const todayEnd = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
        for (const league of LEAGUES) {
            try {
                const data = await loadLeague(league.code);
                const oddsData = await loadOdds(league.code);
                const matches = (data.matches || []).filter(m => {
                    if (!m.homeTeam.name || m.homeTeam.name === 'null') return false;
                    const d = new Date(m.utcDate);
                    return d >= now && d < todayEnd;
                });
                for (const m of matches) {
                    const matchOdds = findOddsForMatch(m, oddsData);
                    const s = calcMatchSummary(m, data, matchOdds);
                    if (s.verdictClass === 'v-bet') {
                        bets.push({ league, match: m, summary: s });
                    }
                }
            } catch(e) {}
        }

        let bodyHTML;
        if (bets.length === 0) {
            bodyHTML = '<div class="empty-msg">\u0421\u0435\u0433\u043E\u0434\u043D\u044F \u043D\u0435\u0442 \u043C\u0430\u0442\u0447\u0435\u0439 \u0441 \u0432\u0435\u0440\u0434\u0438\u043A\u0442\u043E\u043C \u0421\u0422\u0410\u0412\u042c.<br>\u041F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u043E\u0442\u0434\u0435\u043B\u044C\u043D\u044B\u0435 \u043B\u0438\u0433\u0438 \u2014 \u0442\u0430\u043C \u043C\u043E\u0433\u0443\u0442 \u0431\u044B\u0442\u044C \u043C\u0430\u0442\u0447\u0438 \u043D\u0430 \u0434\u0440\u0443\u0433\u0438\u0435 \u0434\u043D\u0438.</div>';
        } else {
            bodyHTML = `<div style="padding:8px 12px;font-size:11px;color:var(--text2);border-bottom:1px solid var(--border)">\u{1F4A1} \u0421\u043E\u0432\u0435\u0442: \u0441\u0442\u0430\u0432\u044C\u0442\u0435 \u043A\u0430\u0436\u0434\u044B\u0439 \u043C\u0430\u0442\u0447 \u043E\u0442\u0434\u0435\u043B\u044C\u043D\u043E (\u043E\u0434\u0438\u043D\u043E\u0447\u043D\u044B\u0435), \u043D\u0435 \u044D\u043A\u0441\u043F\u0440\u0435\u0441\u0441\u043E\u043C</div>` + bets.map(b => {
                const s = b.summary;
                const m = b.match;
                const hName = ruName(m.homeTeam.name);
                const aName = ruName(m.awayTeam.name);
                const kellyRaw = s.evBest > 0 ? (s.evBest / (s.favP > 0 ? (1/s.favP - 1) : 1)) * 0.5 : 0;
                const kelly = Math.min(kellyRaw, 0.05);
                return `<div style="padding:12px;border-bottom:1px solid var(--border)">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
                        <span style="font-size:11px;color:var(--text2)">${b.league.flag} ${b.league.name} \u2022 ${formatTime(m.utcDate)}</span>
                        <span class="v-bet">\u0421\u0422\u0410\u0412\u042c</span>
                    </div>
                    <div style="font-size:14px;font-weight:600;margin-bottom:6px">${hName} <span class="sr-pos">(${s.homePos})</span> \u2014 ${aName} <span class="sr-pos">(${s.awayPos})</span></div>
                    <div style="display:flex;gap:12px;font-size:12px;color:var(--text2);margin-bottom:8px;flex-wrap:wrap">
                        <span>xG: ${s.homeXG.toFixed(1)}-${s.awayXG.toFixed(1)}</span>
                        <span>\u0421\u0442\u0430\u0432\u043A\u0430: <b style="color:var(--green)">${s.evLabel}</b></span>
                        <span>EV: <b style="color:var(--green)">+${(s.evBest*100).toFixed(0)}%</b></span>
                        ${kelly > 0.01 ? `<span>Kelly: <b style="color:var(--blue)">${(kelly*100).toFixed(1)}%</b></span>` : ''}
                    </div>
                    <div style="display:flex;gap:8px">
                        <button class="btn btn-green btn-sm" onclick="closeModal();openPredictionById(${m.id},'${b.league.code}')">\u041F\u0440\u043E\u0433\u043D\u043E\u0437</button>
                        <a class="btn btn-orange btn-sm" style="display:inline-block;padding:6px 16px" href="${fonbetUrl()}" target="_blank" rel="noopener">\u26BD \u0424\u043E\u043D\u0431\u0435\u0442</a>
                    </div>
                </div>`;
            }).join('');
        }

        const modal = document.querySelector('.modal-body');
        if (modal) modal.innerHTML = bodyHTML;
    }

    // Standings modal
    function openStandings() {
        const code = state.currentLeague;
        const data = state.leagueData[code];
        if (!data || !data.standings || !data.standings.length) {
            $('#modalContainer').innerHTML = `
            <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
                <div class="modal">
                    <div class="modal-header"><h2>\u0422\u0430\u0431\u043B\u0438\u0446\u0430</h2><button class="modal-close" onclick="closeModal()">&times;</button></div>
                    <div class="modal-body"><div class="empty-msg">\u0414\u0430\u043D\u043D\u044B\u0435 \u043E \u0442\u0430\u0431\u043B\u0438\u0446\u0435 \u043E\u0442\u0441\u0443\u0442\u0441\u0442\u0432\u0443\u044E\u0442</div></div>
                </div>
            </div>`;
            return;
        }
        const leagueInfo = LEAGUES.find(l => l.code === code);
        const name = leagueInfo ? `${leagueInfo.flag} ${leagueInfo.name}` : code;
        const sorted = [...data.standings].sort((a, b) => {
            if (b.pts !== a.pts) return b.pts - a.pts;
            if (b.gd !== a.gd) return b.gd - a.gd;
            return b.gf - a.gf;
        });
        const total = sorted.length;
        // Zone thresholds (approximate for top leagues)
        const clZone = code === 'CL' ? 0 : Math.min(4, total);
        const elZone = code === 'CL' ? 0 : Math.min(6, total);
        const confZone = code === 'CL' ? 0 : Math.min(7, total);
        const relZone = code === 'CL' ? total : Math.max(total - 3, 0);

        const rows = sorted.map((s, i) => {
            const pos = i + 1;
            let zoneClass = '';
            if (pos <= clZone) zoneClass = 'zone-cl';
            else if (pos <= elZone) zoneClass = 'zone-el';
            else if (pos <= confZone) zoneClass = 'zone-conf';
            else if (pos > relZone) zoneClass = 'zone-rel';
            return `<tr>
                <td class="${zoneClass}" style="font-weight:600">${pos}</td>
                <td style="text-align:left">${s.name || s.id}</td>
                <td>${s.played}</td>
                <td>${s.won}</td>
                <td>${s.draw}</td>
                <td>${s.lost}</td>
                <td>${s.gf}</td>
                <td>${s.ga}</td>
                <td>${s.gd > 0 ? '+' : ''}${s.gd}</td>
                <td style="font-weight:700">${s.pts}</td>
            </tr>`;
        }).join('');

        const legendHTML = code !== 'CL' ? `
        <div class="standings-legend">
            <div class="standings-legend-item"><div class="standings-legend-dot" style="background:var(--blue)"></div> \u041B\u0438\u0433\u0430 \u0427\u0435\u043C\u043F\u0438\u043E\u043D\u043E\u0432</div>
            <div class="standings-legend-item"><div class="standings-legend-dot" style="background:#ff9800"></div> \u041B\u0438\u0433\u0430 \u0415\u0432\u0440\u043E\u043F\u044B</div>
            <div class="standings-legend-item"><div class="standings-legend-dot" style="background:#9c27b0"></div> \u041B\u0438\u0433\u0430 \u041A\u043E\u043D\u0444\u0435\u0440\u0435\u043D\u0446\u0438\u0439</div>
            <div class="standings-legend-item"><div class="standings-legend-dot" style="background:var(--red)"></div> \u0412\u044B\u043B\u0435\u0442</div>
        </div>` : '';

        $('#modalContainer').innerHTML = `
        <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
            <div class="modal">
                <div class="modal-header">
                    <h2>\uD83D\uDCCA \u0422\u0430\u0431\u043B\u0438\u0446\u0430 ${name}</h2>
                    <button class="modal-close" onclick="closeModal()">&times;</button>
                </div>
                <div class="modal-body">
                    <table class="standings-table">
                        <tr><th>#</th><th>\u041A\u043E\u043C\u0430\u043D\u0434\u0430</th><th>\u041C</th><th>\u0412</th><th>\u041D</th><th>\u041F</th><th>\u0413\u0417</th><th>\u0413\u041F</th><th>\u00B1</th><th>\u041E</th></tr>
                        ${rows}
                    </table>
                    ${legendHTML}
                </div>
            </div>
        </div>`;
    }

                    <div class="guide-section">
                        <h3>\u{1F3AF} \u0421\u0438\u0441\u0442\u0435\u043C\u0430 \u0432\u0435\u0440\u0434\u0438\u043A\u0442\u043E\u0432 (3 \u043D\u0435\u0437\u0430\u0432\u0438\u0441\u0438\u043C\u044B\u0445 \u0444\u0430\u043A\u0442\u043E\u0440\u0430)</h3>
                        <p>\u0420\u0430\u043D\u044C\u0448\u0435 \u0431\u044B\u043B\u043E 6 \u043F\u0440\u043E\u0432\u0435\u0440\u043E\u043A, \u043D\u043E \u0447\u0435\u0442\u044B\u0440\u0435 \u0438\u0437 \u043D\u0438\u0445 (Elo, H2H, \u0444\u043E\u0440\u043C\u0430, maxP) \u0438\u0437\u043C\u0435\u0440\u044F\u043B\u0438 <b>\u043E\u0434\u043D\u043E \u0438 \u0442\u043E \u0436\u0435</b> \u2014 \u043A\u0442\u043E \u0444\u0430\u0432\u043E\u0440\u0438\u0442. \u0421\u0438\u0433\u043D\u0430\u043B \u00AB\u0421\u0422\u0410\u0412\u042C\u00BB \u043B\u043E\u0432\u0438\u043B \u043B\u044E\u0431\u043E\u0433\u043E \u044F\u0432\u043D\u043E\u0433\u043E \u0444\u0430\u0432\u043E\u0440\u0438\u0442\u0430 \u0434\u043E\u043C\u0430 \u0430\u0432\u0442\u043E\u043C\u0430\u0442\u043E\u043C. \u0422\u0435\u043F\u0435\u0440\u044C \u043E\u0441\u0442\u0430\u0432\u0438\u043B\u0438 3 <b>\u043D\u0435\u0437\u0430\u0432\u0438\u0441\u0438\u043C\u044B\u0445</b> \u043F\u0440\u043E\u0432\u0435\u0440\u043A\u0438:</p>
                        <ul>
                            <li>\u2705 <b>\u0423\u0432\u0435\u0440\u0435\u043D\u043D\u043E\u0441\u0442\u044C \u043C\u043E\u0434\u0435\u043B\u0438 (maxP > 55%)</b> \u2014 \u0432\u0435\u0440\u043E\u044F\u0442\u043D\u043E\u0441\u0442\u044C \u043B\u0443\u0447\u0448\u0435\u0433\u043E \u0438\u0441\u0445\u043E\u0434\u0430 \u0432\u044B\u0448\u0435 55%</li>
                            <li>\u2705 <b>Value bet</b> \u2014 \u043C\u043E\u0434\u0435\u043B\u044C \u0434\u0430\u0451\u0442 \u043D\u0430 <b>8 \u043F.\u043F.+</b> \u0432\u044B\u0448\u0435, \u0447\u0435\u043C \u043D\u043E\u0440\u043C\u0438\u0440\u043E\u0432\u0430\u043D\u043D\u044B\u0439 \u0440\u044B\u043D\u043E\u043A (\u0431\u0435\u0437 \u043C\u0430\u0440\u0436\u0438 \u0431\u0443\u043A\u043C\u0435\u043A\u0435\u0440\u0430), \u0438 EV > 3%</li>
                            <li>\u2705 <b>\u0410\u0441\u0438\u043C\u043C\u0435\u0442\u0440\u0438\u044F \u0444\u043E\u0440\u043C\u044B</b> \u2014 \u0440\u0430\u0437\u0440\u044B\u0432 \u043C\u0435\u0436\u0434\u0443 \u043F\u043E\u0431\u0435\u0434\u0430\u043C\u0438 \u0444\u0430\u0432\u043E\u0440\u0438\u0442\u0430 \u0438 \u0430\u043D\u0434\u0435\u0440\u0434\u043E\u0433\u0430 \u2265 2 (\u0444\u0430\u0432\u043E\u0440\u0438\u0442 \u0432 \u0444\u043E\u0440\u043C\u0435, \u0430\u043D\u0434\u0435\u0440\u0434\u043E\u0433 \u2014 \u043D\u0435\u0442)</li>
                        </ul>
                        <p><span class="guide-tag guide-tag-green">\u0421\u0422\u0410\u0412\u042c</span> \u2014 \u0432\u0441\u0435 3 \u0444\u0430\u043A\u0442\u043E\u0440\u0430 \u0418 \u0435\u0441\u0442\u044C value bet<br>
                        <span class="guide-tag guide-tag-yellow">\u041E\u0421\u0422\u041E\u0420.</span> \u2014 2 \u0444\u0430\u043A\u0442\u043E\u0440\u0430 \u0438\u0437 3<br>
                        <span class="guide-tag guide-tag-red">\u041F\u0420\u041E\u041F.</span> \u2014 \u043C\u0435\u043D\u044C\u0448\u0435 2, \u043B\u0443\u0447\u0448\u0435 \u043F\u0440\u043E\u043F\u0443\u0441\u0442\u0438\u0442\u044C</p>
                        <p style="font-size:12px;color:var(--text2)">\u{1F4A1} \u0421\u0438\u0433\u043D\u0430\u043B \u0441\u0442\u0430\u043B \u0441\u0442\u0440\u043E\u0436\u0435: \u00AB\u0421\u0422\u0410\u0412\u042C\u00BB \u0431\u0443\u0434\u0435\u0442 \u043F\u043E\u0439\u043C\u0430\u043D \u0440\u0435\u0436\u0435, \u043D\u043E \u0442\u0435\u043F\u0435\u0440\u044C \u044D\u0442\u043E \u0434\u0435\u0439\u0441\u0442\u0432\u0438\u0442\u0435\u043B\u044C\u043D\u043E \u043F\u0440\u0435\u0438\u043C\u0443\u0449\u0435\u0441\u0442\u0432\u043E, \u0430 \u043D\u0435 \u0430\u0432\u0442\u043E\u043C\u0430\u0442.</p>
                    </div>

                    <div class="guide-section">
                        <h3>\uD83D\uDCCA \u041F\u043E\u043A\u0430\u0437\u0430\u0442\u0435\u043B\u0438</h3>
                        <ul>
                            <li><b>xG</b> \u2014 \u043E\u0436\u0438\u0434\u0430\u0435\u043C\u044B\u0435 \u0433\u043E\u043B\u044B. \u0427\u0435\u043C \u0431\u043E\u043B\u044C\u0448\u0435 \u0440\u0430\u0437\u043D\u0438\u0446\u0430, \u0442\u0435\u043C \u0441\u0438\u043B\u044C\u043D\u0435\u0435 \u0444\u0430\u0432\u043E\u0440\u0438\u0442</li>
                            <li><b>Kelly</b> \u2014 \u0440\u0435\u043A\u043E\u043C\u0435\u043D\u0434\u0443\u0435\u043C\u044B\u0439 \u0440\u0430\u0437\u043C\u0435\u0440 \u0441\u0442\u0430\u0432\u043A\u0438 \u0432 % \u043E\u0442 \u0431\u0430\u043D\u043A\u0430 (\u043C\u0430\u043A\u0441. 5%)</li>
                            <li><b>\u0423\u0432\u0435\u0440\u0435\u043D\u043D\u043E\u0441\u0442\u044C (0-10)</b> \u2014 8+ = \u0443\u0432\u0435\u0440\u0435\u043D\u043D\u043E, 5-7 = \u0441\u0440\u0435\u0434\u043D\u0435, <5 = \u0440\u0438\u0441\u043A\u043E\u0432\u0430\u043D\u043D\u043E</li>
                        </ul>
                    </div>

                    <div class="guide-section">
                        <h3>\u{1F4B0} \u0427\u0442\u043E \u0442\u0430\u043A\u043E\u0435 Value Bet \u0438 \u00AB\u0420\u044B\u043D\u043E\u043A vs \u041C\u043E\u0434\u0435\u043B\u044C\u00BB</h3>
                        <p><b>Value bet (\u0432\u044D\u043B\u044C\u044E-\u0431\u0435\u0442)</b> \u2014 \u044D\u0442\u043E \u0441\u0442\u0430\u0432\u043A\u0430, \u0433\u0434\u0435 \u0432\u044B \u043F\u043E\u043B\u0443\u0447\u0430\u0435\u0442\u0435 \u043C\u0430\u0442\u0435\u043C\u0430\u0442\u0438\u0447\u0435\u0441\u043A\u043E\u0435 \u043F\u0440\u0435\u0438\u043C\u0443\u0449\u0435\u0441\u0442\u0432\u043E \u043D\u0430\u0434 \u0431\u0443\u043A\u043C\u0435\u043A\u0435\u0440\u043E\u043C. \u041F\u0440\u043E\u0441\u0442\u044B\u043C\u0438 \u0441\u043B\u043E\u0432\u0430\u043C\u0438:</p>
                        <div class="calc-box" style="margin:10px 0">
                            <p style="font-size:13px;line-height:1.7;margin:0"><b>\u041F\u0440\u0438\u043C\u0435\u0440:</b> \u0411\u0443\u043A\u043C\u0435\u043A\u0435\u0440 \u0434\u0430\u0451\u0442 \u043A\u043E\u044D\u0444\u0444\u0438\u0446\u0438\u0435\u043D\u0442 <b>2.50</b> \u043D\u0430 \u043F\u043E\u0431\u0435\u0434\u0443 \u043A\u043E\u043C\u0430\u043D\u0434\u044B.<br>
                            \u042D\u0442\u043E \u0437\u043D\u0430\u0447\u0438\u0442 \u0431\u0443\u043A\u043C\u0435\u043A\u0435\u0440 \u0441\u0447\u0438\u0442\u0430\u0435\u0442 \u0448\u0430\u043D\u0441 = <b>40%</b> (1 \u00F7 2.50).<br>
                            \u041D\u043E \u043D\u0430\u0448\u0430 \u043C\u043E\u0434\u0435\u043B\u044C \u0433\u043E\u0432\u043E\u0440\u0438\u0442 \u0448\u0430\u043D\u0441 = <b>52%</b>.<br>
                            \u0420\u0430\u0437\u043D\u0438\u0446\u0430 <b>+12%</b> \u2014 \u044D\u0442\u043E \u0432\u0430\u0448\u0435 \u043F\u0440\u0435\u0438\u043C\u0443\u0449\u0435\u0441\u0442\u0432\u043E!</p>
                        </div>
                        <p><b>\u041A\u0430\u043A \u044D\u0442\u043E \u0440\u0430\u0431\u043E\u0442\u0430\u0435\u0442 \u0432 \u043F\u0440\u0438\u043B\u043E\u0436\u0435\u043D\u0438\u0438:</b></p>
                        <ul>
                            <li><b>\u0420\u044B\u043D\u043E\u043A</b> (\u0432\u0435\u0440\u0445\u043D\u044F\u044F \u043F\u043E\u043B\u043E\u0441\u043A\u0430) \u2014 \u043A\u0443\u0434\u0430 \u0441\u0442\u0430\u0432\u044F\u0442 \u043B\u044E\u0434\u0438. \u042D\u0442\u043E \u0432\u0438\u0434\u043D\u043E \u0438\u0437 \u043A\u043E\u044D\u0444\u0444\u0438\u0446\u0438\u0435\u043D\u0442\u043E\u0432 \u0431\u0443\u043A\u043C\u0435\u043A\u0435\u0440\u043E\u0432: \u0447\u0435\u043C \u043D\u0438\u0436\u0435 \u043A\u043E\u044D\u0444\u0444\u0438\u0446\u0438\u0435\u043D\u0442, \u0442\u0435\u043C \u0431\u043E\u043B\u044C\u0448\u0435 \u043B\u044E\u0434\u0435\u0439 \u0441\u0442\u0430\u0432\u0438\u0442 \u043D\u0430 \u044D\u0442\u043E\u0442 \u0438\u0441\u0445\u043E\u0434</li>
                            <li><b>\u041C\u043E\u0434\u0435\u043B\u044C</b> (\u043D\u0438\u0436\u043D\u044F\u044F \u043F\u043E\u043B\u043E\u0441\u043A\u0430) \u2014 \u0447\u0442\u043E \u0433\u043E\u0432\u043E\u0440\u0438\u0442 \u043C\u0430\u0442\u0435\u043C\u0430\u0442\u0438\u043A\u0430 (Dixon-Coles + Elo)</li>
                            <li><span class="guide-tag guide-tag-green">+N%</span> \u2014 \u043C\u043E\u0434\u0435\u043B\u044C \u0434\u0430\u0451\u0442 \u0431\u043E\u043B\u044C\u0448\u0435, \u0447\u0435\u043C \u0440\u044B\u043D\u043E\u043A \u2192 <b>value bet!</b> \u0420\u044B\u043D\u043E\u043A \u043D\u0435\u0434\u043E\u043E\u0446\u0435\u043D\u0438\u0432\u0430\u0435\u0442 \u0438\u0441\u0445\u043E\u0434</li>
                            <li><span class="guide-tag guide-tag-red">-N%</span> \u2014 \u0440\u044B\u043D\u043E\u043A \u043E\u0446\u0435\u043D\u0438\u0432\u0430\u0435\u0442 \u0432\u044B\u0448\u0435, \u0447\u0435\u043C \u043C\u043E\u0434\u0435\u043B\u044C \u2192 \u043D\u0435\u0432\u044B\u0433\u043E\u0434\u043D\u043E</li>
                        </ul>
                        <p><b>EV (Expected Value)</b> \u2014 \u043C\u0430\u0442\u0435\u043C\u0430\u0442\u0438\u0447\u0435\u0441\u043A\u043E\u0435 \u043E\u0436\u0438\u0434\u0430\u043D\u0438\u0435 \u043F\u0440\u0438\u0431\u044B\u043B\u0438. EV +15% \u0437\u043D\u0430\u0447\u0438\u0442: \u043D\u0430 \u043A\u0430\u0436\u0434\u044B\u0435 100\u20BD \u0432\u044B \u0432 \u0441\u0440\u0435\u0434\u043D\u0435\u043C \u043F\u043E\u043B\u0443\u0447\u0438\u0442\u0435 115\u20BD. \u041C\u044B \u043F\u043E\u043C\u0435\u0447\u0430\u0435\u043C value bet \u0442\u043E\u043B\u044C\u043A\u043E \u043A\u043E\u0433\u0434\u0430 \u043C\u043E\u0434\u0435\u043B\u044C \u0434\u0430\u0451\u0442 \u043D\u0430 <b>8 \u043F.\u043F. \u0432\u044B\u0448\u0435</b>, \u0447\u0435\u043C <b>\u043D\u043E\u0440\u043C\u0438\u0440\u043E\u0432\u0430\u043D\u043D\u044B\u0439 \u0440\u044B\u043D\u043E\u043A</b> (\u0431\u0435\u0437 \u043C\u0430\u0440\u0436\u0438 \u0431\u0443\u043A\u043C\u0435\u043A\u0435\u0440\u0430), \u0438 EV > 3%. \u0422\u0430\u043A \u043C\u044B \u0443\u0431\u0438\u0440\u0430\u0435\u043C \u043B\u043E\u0436\u043D\u044B\u0435 value-\u0441\u0438\u0433\u043D\u0430\u043B\u044B, \u043A\u043E\u0442\u043E\u0440\u044B\u0435 \u0432\u043E\u0437\u043D\u0438\u043A\u0430\u044E\u0442 \u043F\u0440\u043E\u0441\u0442\u043E \u0438\u0437-\u0437\u0430 \u0437\u0430\u043A\u043B\u0430\u0434\u043A\u0438 \u0431\u0443\u043A\u043C\u0435\u043A\u0435\u0440\u0430.</p>
                        <p style="font-size:12px;color:var(--text2);margin-top:6px">\u{1F4A1} <b>\u0413\u043B\u0430\u0432\u043D\u043E\u0435 \u043F\u0440\u0430\u0432\u0438\u043B\u043E:</b> \u043D\u0435 \u0432\u0430\u0436\u043D\u043E \u0432\u044B\u0438\u0433\u0440\u0430\u0435\u0442 \u043B\u0438 \u043A\u043E\u043D\u043A\u0440\u0435\u0442\u043D\u0430\u044F \u0441\u0442\u0430\u0432\u043A\u0430. \u0412\u0430\u0436\u043D\u043E, \u0447\u0442\u043E \u043D\u0430 \u0434\u0438\u0441\u0442\u0430\u043D\u0446\u0438\u0438 (50-100 \u0441\u0442\u0430\u0432\u043E\u043A) value bets \u043F\u0440\u0438\u043D\u043E\u0441\u044F\u0442 \u043F\u0440\u0438\u0431\u044B\u043B\u044C, \u043F\u043E\u0442\u043E\u043C\u0443 \u0447\u0442\u043E \u043C\u0430\u0442\u0435\u043C\u0430\u0442\u0438\u043A\u0430 \u043D\u0430 \u0432\u0430\u0448\u0435\u0439 \u0441\u0442\u043E\u0440\u043E\u043D\u0435.</p>
                    </div>

                    <div class="guide-section">
                        <h3>\u{1F4B0} \u042D\u043A\u0441\u043F\u0440\u0435\u0441\u0441 vs \u041E\u0434\u0438\u043D\u043E\u0447\u043D\u044B\u0435 \u0441\u0442\u0430\u0432\u043A\u0438</h3>
                        <p><b>\u041E\u0434\u0438\u043D\u043E\u0447\u043D\u044B\u0435 \u043F\u043E\u0447\u0442\u0438 \u0432\u0441\u0435\u0433\u0434\u0430 \u043B\u0443\u0447\u0448\u0435.</b> \u041F\u043E\u0447\u0435\u043C\u0443:</p>
                        <ul>
                            <li>\u041A\u0430\u0436\u0434\u044B\u0439 \u043C\u0430\u0442\u0447 \u0432 \u044D\u043A\u0441\u043F\u0440\u0435\u0441\u0441\u0435 <b>\u0443\u043C\u043D\u043E\u0436\u0430\u0435\u0442 \u043C\u0430\u0440\u0436\u0443</b> \u0431\u0443\u043A\u043C\u0435\u043A\u0435\u0440\u0430 (5% \u2192 10% \u2192 15%...)</li>
                            <li>\u042D\u043A\u0441\u043F\u0440\u0435\u0441\u0441 \u0438\u0437 2 \u0441\u0442\u0430\u0432\u043E\u043A \u043F\u043E 60% = \u0432\u0441\u0435\u0433\u043E <b>36% \u0448\u0430\u043D\u0441</b> \u0432\u044B\u0438\u0433\u0440\u0430\u0442\u044C</li>
                            <li>\u0422\u0435 \u0436\u0435 2 \u043E\u0434\u0438\u043D\u043E\u0447\u043D\u044B\u0435 \u2014 \u0445\u043E\u0442\u044F \u0431\u044B \u043E\u0434\u043D\u0443 \u0432\u044B\u0438\u0433\u0440\u0430\u0435\u0442\u0435 \u0432 <b>84%</b> \u0441\u043B\u0443\u0447\u0430\u0435\u0432</li>
                        </ul>
                        <p>\u041A\u043E\u0433\u0434\u0430 \u044D\u043A\u0441\u043F\u0440\u0435\u0441\u0441 \u0434\u043E\u043F\u0443\u0441\u0442\u0438\u043C: \u043C\u0430\u043B\u0435\u043D\u044C\u043A\u0430\u044F \u0441\u0443\u043C\u043C\u0430 "\u0434\u043B\u044F \u0430\u0437\u0430\u0440\u0442\u0430", \u043C\u0430\u043A\u0441\u0438\u043C\u0443\u043C 2 \u0441\u043E\u0431\u044B\u0442\u0438\u044F, \u0442\u043E\u043B\u044C\u043A\u043E \u0421\u0422\u0410\u0412\u042c.</p>

                        <div class="calc-box">
                            <div style="font-size:13px;font-weight:600;margin-bottom:8px">\u{1F4F1} \u041A\u0430\u043B\u044C\u043A\u0443\u043B\u044F\u0442\u043E\u0440: \u0441\u0440\u0430\u0432\u043D\u0438 \u044D\u043A\u0441\u043F\u0440\u0435\u0441\u0441 \u0438 \u043E\u0434\u0438\u043D\u043E\u0447\u043D\u044B\u0435</div>
                            <div class="calc-row">
                                <label style="font-size:12px;color:var(--text2)">\u0421\u0443\u043C\u043C\u0430 (\u20BD):</label>
                                <input class="calc-input" type="number" id="calcAmount" value="2000" min="100">
                            </div>
                            <div class="calc-row">
                                <label style="font-size:12px;color:var(--text2)">\u041C\u0430\u0442\u0447\u0435\u0439:</label>
                                <input class="calc-input" type="number" id="calcMatches" value="2" min="2" max="10">
                            </div>
                            <div class="calc-row">
                                <label style="font-size:12px;color:var(--text2)">\u0421\u0440\u0435\u0434\u043D\u0438\u0439 \u043A\u043E\u044D\u0444.:</label>
                                <input class="calc-input" type="number" id="calcOdds" value="1.80" min="1.01" step="0.05">
                            </div>
                            <button class="btn btn-green btn-sm" onclick="calcExpressVsSingle()" style="margin-top:4px">\u0420\u0430\u0441\u0441\u0447\u0438\u0442\u0430\u0442\u044C</button>
                            <div id="calcResults"></div>
                        </div>
                    </div>

                    <div class="guide-section">
                        <h3>\u{1F4A1} \u0421\u043E\u0432\u0435\u0442\u044B \u043E\u0442 \u043A\u043E\u043D\u0441\u0443\u043B\u044C\u0442\u0430\u043D\u0442\u0430-\u0431\u0435\u0442\u0442\u043E\u0440\u0430</h3>
                        <ul>
                            <li>\u{1F4CC} \u0421\u0442\u0430\u0432\u044C\u0442\u0435 \u0442\u043E\u043B\u044C\u043A\u043E \u043D\u0430 <span class="guide-tag guide-tag-green">\u0421\u0422\u0410\u0412\u042c</span> \u2014 \u044D\u0442\u043E \u043C\u0430\u0442\u0447\u0438 \u0441 \u043C\u0430\u0442\u0435\u043C\u0430\u0442\u0438\u0447\u0435\u0441\u043A\u0438\u043C \u043F\u0440\u0435\u0438\u043C\u0443\u0449\u0435\u0441\u0442\u0432\u043E\u043C</li>
                            <li>\u{1F4CC} <b>\u0411\u0430\u043D\u043A\u0440\u043E\u043B\u043B</b>: \u0432\u044B\u0434\u0435\u043B\u0438\u0442\u0435 \u0444\u0438\u043A\u0441\u0438\u0440\u043E\u0432\u0430\u043D\u043D\u0443\u044E \u0441\u0443\u043C\u043C\u0443. \u041D\u0438\u043A\u043E\u0433\u0434\u0430 \u043D\u0435 \u0441\u0442\u0430\u0432\u044C\u0442\u0435 \u00AB\u043D\u0430 \u043F\u043E\u0441\u043B\u0435\u0434\u043D\u0438\u0435\u00BB</li>
                            <li>\u{1F4CC} <b>\u042E\u043D\u0438\u0442 = 1-2% \u0431\u0430\u043D\u043A\u0430</b>. \u041F\u0440\u0438 \u0431\u0430\u043D\u043A\u0435 10 000\u20BD \u043E\u0434\u0438\u043D \u044E\u043D\u0438\u0442 = 100-200\u20BD</li>
                            <li>\u{1F4CC} \u0418\u0441\u043F\u043E\u043B\u044C\u0437\u0443\u0439\u0442\u0435 <b>Kelly</b> \u0434\u043B\u044F \u0440\u0430\u0437\u043C\u0435\u0440\u0430 \u0441\u0442\u0430\u0432\u043A\u0438 \u2014 \u043D\u0435 \u0441\u0442\u0430\u0432\u044C\u0442\u0435 \u0431\u043E\u043B\u044C\u0448\u0435 \u0440\u0435\u043A\u043E\u043C\u0435\u043D\u0434\u0430\u0446\u0438\u0438</li>
                            <li>\u{1F4CC} \u041D\u0435 \u0433\u043E\u043D\u0438\u0442\u0435\u0441\u044C \u0437\u0430 \u043E\u0442\u044B\u0433\u0440\u044B\u0448\u0435\u043C. \u0421\u0435\u0440\u0438\u0438 \u043F\u0440\u043E\u0438\u0433\u0440\u044B\u0448\u0435\u0439 \u043D\u043E\u0440\u043C\u0430\u043B\u044C\u043D\u044B \u0434\u0430\u0436\u0435 \u043F\u0440\u0438 \u043F\u0440\u0430\u0432\u0438\u043B\u044C\u043D\u043E\u0439 \u0441\u0442\u0440\u0430\u0442\u0435\u0433\u0438\u0438</li>
                            <li>\u{1F4CC} <b>\u041E\u0434\u0438\u043D\u043E\u0447\u043D\u044B\u0435 \u0441\u0442\u0430\u0432\u043A\u0438</b> \u0432\u0441\u0435\u0433\u0434\u0430 \u043B\u0443\u0447\u0448\u0435 \u044D\u043A\u0441\u043F\u0440\u0435\u0441\u0441\u043E\u0432. \u042D\u043A\u0441\u043F\u0440\u0435\u0441\u0441 = \u0440\u0430\u0437\u0432\u043B\u0435\u0447\u0435\u043D\u0438\u0435, \u043D\u0435 \u0441\u0442\u0440\u0430\u0442\u0435\u0433\u0438\u044F</li>
                            <li>\u{1F4CC} \u042D\u0442\u043E \u043C\u0430\u0442\u0435\u043C\u0430\u0442\u0438\u0447\u0435\u0441\u043A\u0430\u044F \u043E\u0446\u0435\u043D\u043A\u0430, <b>\u043D\u0435 \u0433\u0430\u0440\u0430\u043D\u0442\u0438\u044F</b>. \u041B\u044E\u0431\u043E\u0439 \u0438\u0441\u0445\u043E\u0434 \u0432\u043E\u0437\u043C\u043E\u0436\u0435\u043D</li>
                        </ul>
                    </div>

                </div>
            </div>
        </div>`;
    }

    function calcExpressVsSingle() {
        const amount = parseFloat(document.getElementById('calcAmount').value) || 2000;
        const n = parseInt(document.getElementById('calcMatches').value) || 2;
        const odds = parseFloat(document.getElementById('calcOdds').value) || 1.80;
        const prob = 1 / odds; // \u043F\u0440\u0438\u0431\u043B\u0438\u0437\u0438\u0442\u0435\u043B\u044C\u043D\u0430\u044F \u0432\u0435\u0440\u043E\u044F\u0442\u043D\u043E\u0441\u0442\u044C

        // \u042D\u043A\u0441\u043F\u0440\u0435\u0441\u0441
        const expressOdds = Math.pow(odds, n);
        const expressWin = amount * expressOdds;
        const expressProb = Math.pow(prob, n);

        // \u041E\u0434\u0438\u043D\u043E\u0447\u043D\u044B\u0435
        const singleBet = amount / n;
        const singleWinEach = singleBet * odds;
        const singleWinAll = singleWinEach * n;
        const singleProbAtLeastOne = 1 - Math.pow(1 - prob, n);

        document.getElementById('calcResults').innerHTML = `
            <div class="calc-result calc-result-express">
                <b>\u{1F534} \u042D\u043A\u0441\u043F\u0440\u0435\u0441\u0441 (${n} \u0441\u043E\u0431\u044B\u0442\u0438\u0439):</b><br>
                \u0421\u0442\u0430\u0432\u043A\u0430: ${amount}\u20BD \u00D7 ${expressOdds.toFixed(2)} = <b>${Math.round(expressWin)}\u20BD</b><br>
                \u0428\u0430\u043D\u0441 \u0432\u044B\u0438\u0433\u0440\u0430\u0442\u044C: <b>${Math.round(expressProb*100)}%</b><br>
                \u0412\u0441\u0435 ${n} \u0434\u043E\u043B\u0436\u043D\u044B \u0441\u044B\u0433\u0440\u0430\u0442\u044C!
            </div>
            <div class="calc-result calc-result-single">
                <b>\u{1F7E2} \u041E\u0434\u0438\u043D\u043E\u0447\u043D\u044B\u0435 (${n} \u00D7 ${Math.round(singleBet)}\u20BD):</b><br>
                \u041A\u0430\u0436\u0434\u0430\u044F: ${Math.round(singleBet)}\u20BD \u00D7 ${odds} = <b>${Math.round(singleWinEach)}\u20BD</b><br>
                \u0415\u0441\u043B\u0438 \u0432\u0441\u0435 \u0441\u044B\u0433\u0440\u0430\u044E\u0442: <b>${Math.round(singleWinAll)}\u20BD</b><br>
                \u0428\u0430\u043D\u0441 \u0432\u044B\u0438\u0433\u0440\u0430\u0442\u044C \u0445\u043E\u0442\u044F \u0431\u044B 1: <b>${Math.round(singleProbAtLeastOne*100)}%</b>
            </div>
            <div style="margin-top:8px;font-size:12px;color:var(--green);font-weight:600">
                \u2705 \u0420\u0435\u043A\u043E\u043C\u0435\u043D\u0434\u0430\u0446\u0438\u044F: \u043E\u0434\u0438\u043D\u043E\u0447\u043D\u044B\u0435 \u2014 \u0448\u0430\u043D\u0441 ${Math.round(singleProbAtLeastOne*100)}% vs ${Math.round(expressProb*100)}%
            </div>`;
    }

    function closeModal() { $('#modalContainer').innerHTML = ''; }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // ==================== DATA REFRESH ====================
    async function refreshData() {
        const code = state.currentLeague;
        if (!code) return;
        // Clear cache for current league to force re-fetch
        delete state.leagueData[code];
        delete state.oddsData[code];
        state.lastRefresh = Date.now();
        await selectLeague(code);
    }

    // Auto-refresh every 5 minutes
    setInterval(() => {
        if (state.currentLeague && !document.querySelector('.modal-overlay')) {
            refreshData();
        }
    }, 5 * 60 * 1000);

    // ==================== INIT ====================
    renderMain();
    </script>
</body>
